<?xml version="1.0" encoding="UTF-8"?>
<!--
  PrismTask in-app launcher icon, round-mask variant.
  Same artwork as icon.svg but with a circular bounds for launchers that
  request the round resource (ic_launcher_round.png). 512x512 viewBox so
  the same render code path works.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512" height="512">
  <defs>
    <radialGradient id="bgGlowR" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#1A1A28"/>
      <stop offset="70%" stop-color="#0B0B14"/>
      <stop offset="100%" stop-color="#050509"/>
    </radialGradient>
    <linearGradient id="prismFillR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circleClip)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgGlowR)"/>

    <!-- incoming beam -->
    <line x1="88" y1="256" x2="206" y2="256"
          stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"
          opacity="0.92"/>

    <!-- prism -->
    <polygon points="256,120 144,368 368,368"
             fill="url(#prismFillR)"
             stroke="#FFFFFF" stroke-width="11" stroke-linejoin="round"
             opacity="0.95"/>

    <!-- 4 theme-colored refracted rays -->
    <line x1="306" y1="240" x2="454" y2="140" stroke="#00F5FF" stroke-width="13" stroke-linecap="round"/>
    <line x1="306" y1="240" x2="456" y2="210" stroke="#FF2D87" stroke-width="13" stroke-linecap="round"/>
    <line x1="306" y1="240" x2="456" y2="282" stroke="#00FF41" stroke-width="13" stroke-linecap="round"/>
    <line x1="306" y1="240" x2="452" y2="362" stroke="#C8B8FF" stroke-width="13" stroke-linecap="round"/>
  </g>
</svg>
