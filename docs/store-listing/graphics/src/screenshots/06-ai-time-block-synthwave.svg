    <g font-size="20" fill="#5E3A7A">
      <text x="0" y="24">8</text><line x1="40" y1="20" x2="984" y2="20" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="124">9</text><line x1="40" y1="120" x2="984" y2="120" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="224">10</text><line x1="40" y1="220" x2="984" y2="220" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="324">11</text><line x1="40" y1="320" x2="984" y2="320" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="424">12</text><line x1="40" y1="420" x2="984" y2="420" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="524">1</text><line x1="40" y1="520" x2="984" y2="520" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="624">2</text><line x1="40" y1="620" x2="984" y2="620" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="724">3</text><line x1="40" y1="720" x2="984" y2="720" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="824">4</text><line x1="40" y1="820" x2="984" y2="820" stroke="#1A0F2E" stroke-width="1"/>
      <text x="0" y="924">5</text><line x1="40" y1="920" x2="984" y2="920" stroke="#1A0F2E" stroke-width="1"/>
