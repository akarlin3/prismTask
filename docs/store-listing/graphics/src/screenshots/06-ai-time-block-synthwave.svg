    <!-- AI-suggested focus block 1 -->
    <g transform="translate(56, 20)">
      <rect x="0" y="0" width="920" height="180" rx="12" fill="#6E3FFF" opacity="0.88"/>
      <rect x="0" y="0" width="8" height="180" fill="#FF2D87"/>
      <text x="28" y="40" font-size="26" font-weight="700" fill="#F0D0FF">Deep work · Q2 memo</text>
      <text x="28" y="70" font-size="20" fill="#F0D0FF" opacity="0.8">8:00 – 9:30 · high energy · 1 Pomodoro quad</text>
