      <text x="324" y="94" fill="#5E3A7A">Tasks</text>
      <circle cx="540" cy="52" r="10" fill="#FF2D87"/>
      <text x="540" y="94" fill="#FF2D87">Planner</text>
      <text x="756" y="94" fill="#5E3A7A">Habits</text>
      <text x="972" y="94" fill="#5E3A7A">Settings</text>
    </g>
  </g>

  <rect x="0" y="1632" width="1080" height="288" fill="url(#captionFade06)"/>
  <text x="540" y="1768" font-size="68" font-weight="700" fill="#F0D0FF" text-anchor="middle">Plan your week in seconds.</text>
  <text x="540" y="1830" font-size="30" fill="#FF2D87" text-anchor="middle" font-family="'Space Grotesk', sans-serif">AI time blocks matched to your energy and calendar.</text>
</svg>
