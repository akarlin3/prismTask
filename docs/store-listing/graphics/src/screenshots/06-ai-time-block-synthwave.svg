<?xml version="1.0" encoding="UTF-8"?>
<!-- Screenshot 06 — AI Time Blocking, Synthwave theme. Caption: "Plan your week in seconds." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920"
     font-family="'Rajdhani', 'Space Grotesk', sans-serif">
  <defs>
    <linearGradient id="captionFade06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0717" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0D0717" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0D0717" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="#0D0717"/>

  <g fill="#F0D0FF" font-size="24" font-weight="600">
