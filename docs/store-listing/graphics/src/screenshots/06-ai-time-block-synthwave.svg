  <!-- Action bar -->
  <g transform="translate(48, 1420)">
    <rect x="0" y="0" width="486" height="84" rx="20" fill="#FF2D87"/>
    <text x="243" y="54" font-size="28" font-weight="700" fill="#0D0717" text-anchor="middle">Accept plan</text>
    <rect x="498" y="0" width="486" height="84" rx="20" fill="none" stroke="#6E3FFF" stroke-width="2"/>
    <text x="741" y="54" font-size="26" font-weight="600" fill="#B080D0" text-anchor="middle">Regenerate</text>
  </g>

  <!-- Bottom nav -->
  <g transform="translate(0, 1504)">
    <rect x="0" y="0" width="1080" height="128" fill="#130820"/>
    <rect x="0" y="0" width="1080" height="2" fill="#6E3FFF" opacity="0.3"/>
    <g font-size="18" text-anchor="middle" font-family="'Space Grotesk', sans-serif">
