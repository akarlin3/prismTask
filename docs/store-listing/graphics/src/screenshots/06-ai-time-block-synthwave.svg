    <!-- Walk block (short recovery) -->
    <g transform="translate(56, 740)">
      <rect x="0" y="0" width="920" height="60" rx="10" fill="#00EE88" opacity="0.75"/>
      <text x="20" y="38" font-size="20" font-weight="700" fill="#0D0717">Walk · 20 min</text>
      <text x="320" y="38" font-size="18" fill="#0D0717" opacity="0.85">AI scheduled recovery after deep work</text>
    </g>

    <!-- Meeting block -->
    <g transform="translate(56, 820)">
      <rect x="0" y="0" width="920" height="60" rx="10" fill="#130820" stroke="#5E3A7A" stroke-width="2"/>
      <text x="20" y="38" font-size="20" fill="#B080D0">Design sync</text>
      <text x="260" y="38" font-size="18" fill="#5E3A7A">Calendar · 4:00 – 4:30</text>
