        <text x="40" y="20" font-size="16" text-anchor="middle" font-weight="700" fill="#0D0717">accept</text>
      </g>
    </g>

    <!-- AI-suggested focus block 2 (afternoon) -->
    <g transform="translate(56, 500)">
      <rect x="0" y="0" width="920" height="220" rx="12" fill="#6E3FFF" opacity="0.88"/>
      <rect x="0" y="0" width="8" height="220" fill="#FF2D87"/>
      <text x="28" y="40" font-size="26" font-weight="700" fill="#F0D0FF">Client proposal draft</text>
      <text x="28" y="70" font-size="20" fill="#F0D0FF" opacity="0.8">1:00 – 3:15 · steady energy · 2 Pomodoros + review</text>
      <g transform="translate(28, 96)">
        <rect x="0" y="0" width="76" height="28" rx="14" fill="#FF2D87"/>
        <text x="38" y="20" font-size="14" text-anchor="middle" font-weight="700" fill="#0D0717">AI</text>
        <text x="92" y="20" font-size="18" fill="#F0D0FF" opacity="0.85">Paired with afternoon peak from your energy log</text>
      </g>
      <g transform="translate(28, 152)">
