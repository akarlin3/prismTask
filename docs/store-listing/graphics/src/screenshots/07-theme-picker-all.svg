<?xml version="1.0" encoding="UTF-8"?>
<!-- Screenshot 07 — Theme picker showing all 4 themes side-by-side. Caption: "Four themes. Your mood." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920"
