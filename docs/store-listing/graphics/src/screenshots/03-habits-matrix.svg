<?xml version="1.0" encoding="UTF-8"?>
<!-- Screenshot 03 — Habits with streak, Matrix theme. Caption: "Streaks that forgive." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920"
     font-family="'Share Tech Mono', 'VT323', 'Space Grotesk', monospace">
  <defs>
    <linearGradient id="captionFade03" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010D03" stop-opacity="0"/>
      <stop offset="40%" stop-color="#010D03" stop-opacity="0.92"/>
