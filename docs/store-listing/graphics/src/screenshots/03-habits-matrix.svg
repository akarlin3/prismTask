    <rect x="0" y="0" width="984" height="128" rx="20" fill="#0A1400" stroke="#AAFF00" stroke-opacity="0.4" stroke-width="2"/>
    <text x="32" y="48" font-size="24" font-weight="700" fill="#AAFF00">↻ Forgiveness mode</text>
    <text x="32" y="84" font-size="22" fill="#B0FFB8" font-family="'Space Grotesk', sans-serif">Missed April 18 — streak preserved (1 grace day used this week).</text>
    <text x="32" y="110" font-size="18" fill="#70CC80" font-family="'Space Grotesk', sans-serif">Miss one more and the counter pauses, not resets.</text>
  </g>

  <!-- Complete-today button -->
  <g transform="translate(48, 1160)">
    <rect x="0" y="0" width="984" height="112" rx="20" fill="#00FF41"/>
    <text x="492" y="72" font-size="36" font-weight="700" fill="#010D03" text-anchor="middle" font-family="'Space Grotesk', sans-serif">✓ Mark today done</text>
