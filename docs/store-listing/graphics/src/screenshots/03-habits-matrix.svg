    <rect x="0" y="0" width="1080" height="128" fill="#010F04"/>
    <rect x="0" y="0" width="1080" height="2" fill="#00FF41" opacity="0.25"/>
    <g font-size="18" text-anchor="middle" font-family="'Space Grotesk', sans-serif">
