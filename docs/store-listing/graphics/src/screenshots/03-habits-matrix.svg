      <text x="0" y="76" font-size="120" font-weight="700" fill="#00FF41">47</text>
      <text x="264" y="76" font-size="32" fill="#70CC80">days</text>
    </g>
    <!-- Small trend sparkline -->
    <g transform="translate(620, 60)">
