  <text x="540" y="1768" font-size="68" font-weight="700" fill="#B0FFB8" text-anchor="middle" font-family="'Share Tech Mono', monospace">Streaks that forgive.</text>
  <text x="540" y="1830" font-size="30" fill="#00FF41" text-anchor="middle" font-family="'Space Grotesk', sans-serif">Miss a day without losing your run.</text>
