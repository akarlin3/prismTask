<?xml version="1.0" encoding="UTF-8"?>
<!-- Screenshot 01 — Today screen, Cyberpunk theme. Caption: "Your day, organized." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920"
     font-family="'Chakra Petch', 'Space Grotesk', sans-serif">
  <defs>
    <linearGradient id="captionFade01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0F" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0A0A0F" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#0A0A0F"/>

  <!-- Status bar -->
  <g fill="#E0F8FF" font-size="24" font-weight="600">
    <text x="48" y="50">9:41</text>
    <circle cx="960" cy="42" r="6" fill="#E0F8FF"/>
    <circle cx="984" cy="42" r="6" fill="#E0F8FF"/>
    <circle cx="1008" cy="42" r="6" fill="#E0F8FF"/>
    <rect x="1024" y="32" width="28" height="20" rx="4" fill="none" stroke="#E0F8FF" stroke-width="2"/>
    <rect x="1027" y="35" width="18" height="14" fill="#00F5FF"/>
  </g>

  <!-- App bar -->
  <text x="48" y="160" font-size="72" font-weight="700" fill="#E0F8FF">Today</text>
  <text x="48" y="206" font-size="28" fill="#A0CCD4">Friday, April 24 · 62% done</text>

  <!-- Progress ring (right-aligned) -->
  <g transform="translate(880, 160)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#111120" stroke-width="14"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00F5FF" stroke-width="14"
            stroke-dasharray="312 192" stroke-dashoffset="125" stroke-linecap="round"
            transform="rotate(-90)"/>
    <text x="0" y="14" font-size="40" text-anchor="middle" font-weight="700" fill="#E0F8FF">62%</text>
  </g>

  <!-- Balance bar section -->
  <g transform="translate(48, 284)">
    <text x="0" y="0" font-size="24" font-weight="600" fill="#A0CCD4">Balance this week</text>
    <rect x="0" y="24" width="984" height="28" rx="14" fill="#111120"/>
    <rect x="0" y="24" width="420" height="28" rx="14" fill="#00F5FF"/>
    <rect x="420" y="24" width="260" height="28" rx="14" fill="#00FF88"/>
    <rect x="680" y="24" width="190" height="28" rx="14" fill="#FFCC00"/>
    <rect x="870" y="24" width="114" height="28" rx="14" fill="#FF00AA"/>
    <g font-size="20" fill="#A0CCD4">
      <text x="0" y="84">Work 42%</text>
      <text x="200" y="84" fill="#00FF88">Self-care 26%</text>
      <text x="470" y="84" fill="#FFCC00">Personal 19%</text>
      <text x="720" y="84" fill="#FF00AA">Health 13%</text>
    </g>
  </g>

  <!-- Section: Overdue -->
  <g transform="translate(48, 424)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#FF00AA">Overdue · 1</text>
    <rect x="0" y="24" width="984" height="112" rx="16" fill="#0D0D18" stroke="#FF00AA" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="44" cy="80" r="18" fill="none" stroke="#FF00AA" stroke-width="3"/>
    <text x="84" y="68" font-size="30" font-weight="600" fill="#E0F8FF">Send invoice to client</text>
    <text x="84" y="104" font-size="22" fill="#FF00AA">Yesterday · Work · !High</text>
  </g>

  <!-- Section: Today -->
  <g transform="translate(48, 596)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#E0F8FF">Today · 5</text>

    <!-- Task 1 — scheduled -->
    <g transform="translate(0, 24)">
      <rect x="0" y="0" width="984" height="108" rx="16" fill="#0D0D18"/>
      <circle cx="44" cy="54" r="18" fill="none" stroke="#00F5FF" stroke-width="3"/>
      <text x="84" y="42" font-size="30" font-weight="600" fill="#E0F8FF">Review design brief</text>
      <text x="84" y="78" font-size="22" fill="#A0CCD4">2:00 PM · Work · Acme project</text>
      <text x="940" y="62" font-size="22" fill="#00F5FF" text-anchor="end">2h</text>
    </g>

    <!-- Task 2 — completed -->
    <g transform="translate(0, 148)">
      <rect x="0" y="0" width="984" height="108" rx="16" fill="#0D0D18" opacity="0.7"/>
      <circle cx="44" cy="54" r="18" fill="#00F5FF"/>
      <path d="M36,54 L44,62 L56,46" stroke="#0A0A0F" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="42" font-size="30" font-weight="600" fill="#4A8A9A" text-decoration="line-through">Morning check-in</text>
      <text x="84" y="78" font-size="22" fill="#4A8A9A">Done · Self-care</text>
    </g>

    <!-- Task 3 — subtasks -->
    <g transform="translate(0, 272)">
      <rect x="0" y="0" width="984" height="148" rx="16" fill="#0D0D18"/>
      <circle cx="44" cy="54" r="18" fill="none" stroke="#00F5FF" stroke-width="3"/>
      <text x="84" y="42" font-size="30" font-weight="600" fill="#E0F8FF">Pack for conference</text>
      <text x="84" y="78" font-size="22" fill="#A0CCD4">Tonight · Personal · 4 subtasks</text>
      <rect x="84" y="96" width="840" height="10" rx="5" fill="#111120"/>
      <rect x="84" y="96" width="210" height="10" rx="5" fill="#00F5FF"/>
      <text x="84" y="132" font-size="20" fill="#4A8A9A">1 of 4 done</text>
    </g>

    <!-- Task 4 — recurrence -->
    <g transform="translate(0, 436)">
      <rect x="0" y="0" width="984" height="108" rx="16" fill="#0D0D18"/>
      <circle cx="44" cy="54" r="18" fill="none" stroke="#00F5FF" stroke-width="3"/>
      <text x="84" y="42" font-size="30" font-weight="600" fill="#E0F8FF">Walk · 20 min</text>
      <text x="84" y="78" font-size="22" fill="#A0CCD4">Flexible · Health · Every weekday</text>
      <g transform="translate(910, 54)">
        <circle cx="0" cy="0" r="18" fill="#001A1A"/>
        <path d="M-8,-4 A6,6 0 1 1 2,4 L2,8 M4,8 L-6,8" stroke="#00F5FF" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Task 5 — medication -->
    <g transform="translate(0, 560)">
      <rect x="0" y="0" width="984" height="108" rx="16" fill="#0D0D18"/>
      <circle cx="44" cy="54" r="18" fill="none" stroke="#00F5FF" stroke-width="3"/>
      <text x="84" y="42" font-size="30" font-weight="600" fill="#E0F8FF">Evening meds</text>
      <text x="84" y="78" font-size="22" fill="#A0CCD4">9:00 PM · Health · 2 medications</text>
    </g>
  </g>

  <!-- Bottom nav (still within content area) -->
  <g transform="translate(0, 1504)">
    <rect x="0" y="0" width="1080" height="128" fill="#0D0D18"/>
    <rect x="0" y="0" width="1080" height="2" fill="#00F5FF" opacity="0.2"/>
    <g font-size="18" text-anchor="middle">
      <g transform="translate(108, 64)">
        <circle cx="0" cy="-12" r="10" fill="#00F5FF"/>
        <text y="30" fill="#00F5FF">Today</text>
      </g>
      <g transform="translate(324, 64)">
        <circle cx="0" cy="-12" r="10" fill="#4A8A9A"/>
        <text y="30" fill="#4A8A9A">Tasks</text>
      </g>
      <g transform="translate(540, 64)">
        <circle cx="0" cy="-12" r="10" fill="#4A8A9A"/>
        <text y="30" fill="#4A8A9A">Projects</text>
      </g>
      <g transform="translate(756, 64)">
        <circle cx="0" cy="-12" r="10" fill="#4A8A9A"/>
        <text y="30" fill="#4A8A9A">Habits</text>
      </g>
      <g transform="translate(972, 64)">
        <circle cx="0" cy="-12" r="10" fill="#4A8A9A"/>
        <text y="30" fill="#4A8A9A">Settings</text>
      </g>
    </g>
  </g>

  <!-- Caption strip (bottom 15% = 288px) -->
  <rect x="0" y="1632" width="1080" height="288" fill="url(#captionFade01)"/>
  <text x="540" y="1768" font-size="68" font-weight="700" fill="#E0F8FF" text-anchor="middle">Your day, organized.</text>
  <text x="540" y="1830" font-size="30" fill="#00F5FF" text-anchor="middle">Tasks, habits, and focus — all in one Today.</text>
</svg>
