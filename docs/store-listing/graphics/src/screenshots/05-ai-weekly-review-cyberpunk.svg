<?xml version="1.0" encoding="UTF-8"?>
<!-- Screenshot 05 — AI Weekly Review, Cyberpunk theme. Caption: "Reflect with AI." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920"
     font-family="'Chakra Petch', 'Space Grotesk', sans-serif">
  <defs>
    <linearGradient id="captionFade05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0F" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0A0A0F" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="#0A0A0F"/>

  <g fill="#E0F8FF" font-size="24" font-weight="600">
    <text x="48" y="50">9:41</text>
    <rect x="1024" y="32" width="28" height="20" rx="4" fill="none" stroke="#E0F8FF" stroke-width="2"/>
    <rect x="1027" y="35" width="18" height="14" fill="#00F5FF"/>
  </g>

  <text x="48" y="160" font-size="66" font-weight="700" fill="#E0F8FF">Weekly review</text>
  <text x="48" y="204" font-size="26" fill="#A0CCD4">April 18 – April 24 · auto-draft by AI</text>

  <!-- Metrics row -->
  <g transform="translate(48, 252)">
    <!-- Card 1: Completion -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="310" height="180" rx="20" fill="#0D0D18"/>
      <text x="24" y="44" font-size="22" fill="#A0CCD4">Tasks done</text>
      <text x="24" y="116" font-size="80" font-weight="700" fill="#00F5FF">34</text>
      <text x="24" y="148" font-size="20" fill="#00FF88">↑ 6 vs last week</text>
    </g>
    <g transform="translate(336, 0)">
      <rect x="0" y="0" width="310" height="180" rx="20" fill="#0D0D18"/>
      <text x="24" y="44" font-size="22" fill="#A0CCD4">Focus time</text>
      <text x="24" y="116" font-size="80" font-weight="700" fill="#00F5FF">11h</text>
      <text x="24" y="148" font-size="20" fill="#00FF88">22 Pomodoros</text>
    </g>
    <g transform="translate(672, 0)">
      <rect x="0" y="0" width="310" height="180" rx="20" fill="#0D0D18"/>
      <text x="24" y="44" font-size="22" fill="#A0CCD4">Balance</text>
      <text x="24" y="116" font-size="80" font-weight="700" fill="#00F5FF">A−</text>
      <text x="24" y="148" font-size="20" fill="#FFCC00">work edged high</text>
    </g>
  </g>

  <!-- AI summary card -->
  <g transform="translate(48, 464)">
    <rect x="0" y="0" width="984" height="460" rx="20" fill="#0D0D18" stroke="#00F5FF" stroke-opacity="0.3" stroke-width="2"/>
    <g transform="translate(24, 36)">
      <rect x="0" y="0" width="92" height="36" rx="18" fill="#00F5FF"/>
      <text x="46" y="26" font-size="20" font-weight="700" fill="#0A0A0F" text-anchor="middle">AI · Sonnet</text>
    </g>
    <text x="24" y="112" font-size="28" font-weight="700" fill="#E0F8FF">What went well</text>
    <g font-size="22" fill="#A0CCD4">
      <text x="24" y="152">• Shipped the design brief two days early — three days of deep work</text>
      <text x="24" y="184">&#160;&#160;stacked early in the week paid off.</text>
      <text x="24" y="222">• Meditation streak crossed 47 days. Morning check-in stayed at 7/7.</text>
      <text x="24" y="260">• You protected Friday afternoon from meetings — reflected in calmer</text>
      <text x="24" y="292">&#160;&#160;mood logs and a full Pomodoro quad.</text>
    </g>
    <text x="24" y="348" font-size="28" font-weight="700" fill="#E0F8FF">Consider for next week</text>
    <g font-size="22" fill="#A0CCD4">
      <text x="24" y="388">• Work was 58% of your logged time — target is 50%. Move the Friday</text>
      <text x="24" y="420">&#160;&#160;quarterly planning block to Monday to lighten the week's tail.</text>
    </g>
  </g>

  <!-- Mood line -->
  <g transform="translate(48, 956)">
    <rect x="0" y="0" width="984" height="240" rx="20" fill="#0D0D18"/>
    <text x="24" y="44" font-size="24" font-weight="700" fill="#E0F8FF">Mood through the week</text>
    <text x="24" y="72" font-size="18" fill="#A0CCD4">daily average · 1 to 5</text>
    <!-- Axes -->
    <line x1="60" y1="208" x2="940" y2="208" stroke="#111120" stroke-width="2"/>
    <line x1="60" y1="100" x2="940" y2="100" stroke="#111120" stroke-width="1" stroke-dasharray="4 6"/>
    <!-- Line -->
    <polyline points="88,156 216,140 340,184 472,112 604,156 740,100 872,128"
              fill="none" stroke="#00F5FF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Points -->
    <g fill="#00F5FF">
      <circle cx="88"  cy="156" r="6"/>
      <circle cx="216" cy="140" r="6"/>
      <circle cx="340" cy="184" r="6"/>
      <circle cx="472" cy="112" r="6"/>
      <circle cx="604" cy="156" r="6"/>
      <circle cx="740" cy="100" r="6"/>
      <circle cx="872" cy="128" r="6"/>
    </g>
    <g font-size="16" fill="#4A8A9A" text-anchor="middle">
      <text x="88"  y="232">Sat</text>
      <text x="216" y="232">Sun</text>
      <text x="340" y="232">Mon</text>
      <text x="472" y="232">Tue</text>
      <text x="604" y="232">Wed</text>
      <text x="740" y="232">Thu</text>
      <text x="872" y="232">Fri</text>
    </g>
  </g>

  <!-- Actions bar -->
  <g transform="translate(48, 1224)">
    <rect x="0" y="0" width="486" height="92" rx="20" fill="#00F5FF"/>
    <text x="243" y="58" font-size="28" font-weight="700" fill="#0A0A0F" text-anchor="middle">Save review</text>
    <rect x="498" y="0" width="486" height="92" rx="20" fill="none" stroke="#00F5FF" stroke-width="2"/>
    <text x="741" y="58" font-size="28" font-weight="600" fill="#00F5FF" text-anchor="middle">Regenerate with notes</text>
  </g>

  <!-- Bottom nav -->
  <g transform="translate(0, 1504)">
    <rect x="0" y="0" width="1080" height="128" fill="#0D0D18"/>
    <rect x="0" y="0" width="1080" height="2" fill="#00F5FF" opacity="0.2"/>
    <g font-size="18" text-anchor="middle">
      <text x="108" y="94" fill="#4A8A9A">Today</text>
      <text x="324" y="94" fill="#4A8A9A">Tasks</text>
      <text x="540" y="94" fill="#4A8A9A">Projects</text>
      <text x="756" y="94" fill="#4A8A9A">Habits</text>
      <circle cx="972" cy="52" r="10" fill="#00F5FF"/>
      <text x="972" y="94" fill="#00F5FF">Review</text>
    </g>
  </g>

  <rect x="0" y="1632" width="1080" height="288" fill="url(#captionFade05)"/>
  <text x="540" y="1768" font-size="68" font-weight="700" fill="#E0F8FF" text-anchor="middle">Reflect with AI.</text>
  <text x="540" y="1830" font-size="30" fill="#00F5FF" text-anchor="middle">Weekly reviews drafted by Claude, edited by you.</text>
</svg>
