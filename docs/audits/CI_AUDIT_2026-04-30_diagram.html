<div id="root" class="min-h-screen"></div>

<script type="text/babel">
const {useMemo, useState} = React;

/* ─── data model ─────────────────────────────────────────────────────── */

const TRIGGERS = [
  { id: "t-pr",        label: "pull_request → main",          tone: "sky",     hint: "Most common — every PR open / sync / reopen / label" },
  { id: "t-push-main", label: "push → main",                  tone: "emerald", hint: "After auto-merge squashes (only fires for hand-pushed direct-to-main commits — gh pr merge under GITHUB_TOKEN suppresses this)" },
  { id: "t-tag",       label: "push → tag vX.Y.Z",            tone: "amber",   hint: "release.yml — but [skip ci] on the bump commit usually suppresses this; tag-and-release dispatches release.yml directly" },
  { id: "t-label",     label: "PR labeled ci:integration",    tone: "violet",  hint: "Auto-applied by label-integration-ci.yml when DAO / Migrations / androidTest paths change" },
  { id: "t-wfrun",     label: "workflow_run (chained)",       tone: "rose",    hint: "Documented exception to GITHUB_TOKEN anti-recursion rule — chains Auto-merge → Version Bump → Auto-update-branch" },
  { id: "t-dispatch",  label: "workflow_dispatch (manual)",   tone: "slate",   hint: "Manual GitHub UI / gh workflow run" },
  { id: "t-mergegrp",  label: "merge_group",                  tone: "slate",   hint: "GitHub merge queue (defined on android-ci, backend-ci, web-ci, android-integration but no merge queue is configured)" },
];

const WORKFLOWS = [
  {
    id: "android-ci",
    name: "Android CI",
    file: ".github/workflows/android-ci.yml",
    triggers: ["t-pr", "t-push-main", "t-mergegrp", "t-dispatch"],
    jobs: [
      { name: "autofix",          notes: "PR-only. Runs ktlintFormat + detekt --auto-correct in PARALLEL with lint-and-test, commits style fixes back. Pushes via AUTOFIX_PAT (so downstream checks fire) with GITHUB_TOKEN fallback. Authoritative ktlintCheck verdict lives here." },
      { name: "lint-and-test",    notes: "Required status check. Runs detekt + lintDebug (PR) or full lint (push:main) + compiles androidTest sources for type-check + testDebugUnitTest. Verifies JUnit XML belt-and-suspenders. Posts failure comment to PR.", required: true },
      { name: "tag-and-release",  notes: "push:main only. Bumps versionCode/Name + commits with [skip ci] + pushes vX.Y.Z tag + dispatches release.yml. Covers hand-pushed direct-to-main commits. AUTO-merged PRs get bumped by Version Bump & Tag instead." },
      { name: "capture-failure-log (reusable)", notes: "Fires on any job failure. Pushes log to ci-logs branch." },
    ],
    color: "emerald",
  },
  {
    id: "android-integration",
    name: "Android Integration CI",
    file: ".github/workflows/android-integration.yml",
    triggers: ["t-pr", "t-push-main", "t-mergegrp", "t-dispatch", "t-label"],
    jobs: [
      { name: "connected-tests",     notes: "Required status check. AVD (api 34, pixel_6, x86_64) + Firebase Emulator (firestore + auth) + connectedDebugAndroidTest. PRs need ci:integration label to actually run; otherwise the required check posts as skipped success.", required: true },
      { name: "cross-device-tests",  notes: "Quarantined lane. Same AVD+Firebase shape but runs ONLY MedicationCrossDeviceConvergenceTest. NOT in branch-protection required list (kept separate because the connected-tests baseline flake rate is ~22%)." },
      { name: "capture-failure-log (reusable)", notes: "Fires on connected-tests failure." },
    ],
    color: "indigo",
  },
  {
    id: "backend-ci",
    name: "Backend CI",
    file: ".github/workflows/backend-ci.yml",
    triggers: ["t-pr", "t-push-main", "t-mergegrp", "t-dispatch"],
    jobs: [
      { name: "test",  notes: "Required status check. Postgres 16 service + Python 3.11 + pip cache + ruff + alembic upgrade head + pytest -x with --junitxml. dorny/paths-filter short-circuits when no backend/** changes (but Postgres service still gets provisioned).", required: true },
      { name: "capture-failure-log (reusable)", notes: "Fires on test failure." },
    ],
    color: "amber",
  },
  {
    id: "web-ci",

    file: ".github/workflows/web-ci.yml",
    triggers: ["t-pr", "t-push-main", "t-mergegrp", "t-dispatch"],
    jobs: [
      { name: "web-lint-and-test", notes: "Required status check. Node 22 + npm ci + ESLint + Vitest + tsc -b && vite build. Renamed from 'lint-and-test' to avoid colliding with Android CI's same-named job in branch protection (collision had let one workflow's failure slip through if the other passed).", required: true },
      { name: "e2e",                notes: "needs: web-lint-and-test. Playwright (Chromium + Mobile Chrome) against `npm run dev` server. CI gets 2 retries, 1 worker, GitHub reporter. Cached browser binaries by package-lock hash. NOT a required status check." },
      { name: "capture-failure-log (reusable)", notes: "Fires on either job failure." },
    ],
    color: "cyan",
  },
  {
    id: "auto-merge",
    name: "Auto-merge & Release",
    file: ".github/workflows/auto-merge.yml",
    triggers: ["t-pr", "t-dispatch"],
    jobs: [
      { name: "auto-merge",  notes: "Polls until non-Auto-merge checks queue (60s ceiling), waits until ALL required checks are visible (90s ceiling — comment notes the MISSING-list compare loop has an unidentified bug where it never empties), waits for all to pass via lewagon/wait-on-check-action (SHA-pinned), gh pr update-branch if BEHIND (uses AUTOFIX_PAT so downstream checks fire), then `gh pr merge --auto --squash --delete-branch`. Skips bot-authored synchronize events." },
      { name: "capture-failure-log (reusable)", notes: "Fires on auto-merge failure." },
    ],
    color: "rose",
  },
  {
    id: "version-bump",
    name: "Version Bump & Tag",
    file: ".github/workflows/version-bump-and-tag.yml",
    triggers: ["t-wfrun", "t-dispatch"],
    chainSource: "auto-merge",
    jobs: [
      { name: "version-bump-and-tag", notes: "workflow_run on Auto-merge completion. Resolves PR #, polls until MERGED (20-min ceiling), bumps versionCode + patch on main with [skip ci], pushes annotated vX.Y.Z tag, dispatches release.yml on the tag (needed because [skip ci] suppresses the tag-push trigger). Uses AUTOFIX_PAT to bypass branch protection for the bump push." },
      { name: "capture-failure-log (reusable)", notes: "Fires on bump failure." },
    ],
    color: "fuchsia",
  },
  {
    id: "auto-update-branch",
    name: "Auto-update-branch",
    file: ".github/workflows/auto-update-branch.yml",
    triggers: ["t-push-main", "t-pr", "t-wfrun", "t-dispatch"],
    chainSource: "version-bump",
    jobs: [
      { name: "update-behind-prs", notes: "Walks every open PR targeting main, calls gh pr update-branch on any with mergeStateStatus=BEHIND. Uses AUTOFIX_PAT so downstream required checks fire. Handles auth/conflict failures by posting deduped PR comments (auth=fatal, conflict=cosmetic). Opt-out via no-auto-update label." },
    ],
    color: "lime",
  },
  {
    id: "label-integration",
    name: "Auto-label ci:integration",
    file: ".github/workflows/label-integration-ci.yml",
    triggers: ["t-pr"],
    jobs: [
      { name: "maybe-label", notes: "Reads PR's changed files via REST. If any path matches data/local/, androidTest/, PrismTaskDatabase.kt, or Migrations.kt → applies ci:integration label, which makes Android Integration CI's connected-tests actually run." },
    ],
    color: "violet",
  },
  {
    id: "release",
    name: "Build and Release APK + AAB",
    file: ".github/workflows/release.yml",
    triggers: ["t-tag", "t-dispatch"],
    chainSource: "version-bump",
    jobs: [
      { name: "build-and-release", notes: "Decodes keystore from secrets, bumps versionCode AGAIN (sed-only, never committed — see Finding F3), `gradle assembleRelease bundleRelease`, uploads artifacts, creates GitHub Release with --generate-notes, POSTs APK to backend's /api/v1/app/releases (continue-on-error)." },
      { name: "capture-failure-log (reusable)", notes: "Fires on release failure." },
    ],
    color: "orange",
  },
  {
    id: "capture-failure",
    name: "Reusable Failure Capture",
    file: ".github/workflows/capture-failure.yml",
    triggers: [],
    reusable: true,
    jobs: [
      { name: "capture", notes: "workflow_call only. Uses ./.github/actions/capture-failure-log to fetch the failing job's logs via REST API + write metadata, then ./.github/actions/commit-ci-log to clone the ci-logs orphan branch, append both `<timestamp>-<run-id>.log` (history) and `latest.log`, and push with rebase-on-reject retry (3 attempts)." },
    ],
    color: "stone",
  },
];

const FINDINGS = [
  {
    id: "F1",
    sev: "high",
    title: "Repo URL drift after the averycorp org transfer",
    body: "android-ci.yml (line 128–131) confirms the repo was transferred from a user account to the averycorp org on 2026-04-28 — yet CI_LOGS.md, scripts/setup-branch-protection.sh (defaults to akarlin3/prismTask), web/README.md badge URLs, and docs/privacy/*.md still reference akarlin3/prismTask. CLAUDE.md uses Akarlin3/PrismTask (also wrong). Three different out-of-date references, none of which match the live repo. Anyone fetching the documented `latest.log` URLs will 404.",
    fix: "Single-pass find/replace: `akarlin3/prismTask` and `Akarlin3/PrismTask` → the actual current owner/repo (verify with `gh repo view` first). Update CI_LOGS.md, CLAUDE.md, web/README.md badges, docs/privacy/*.md, scripts/setup-branch-protection.sh REPO default.",
    resolution: { status: "open", pr: 954, branch: "chore/repo-url-drift", note: "All checks green; auto-merge enabled. Awaiting auto-update-branch rebase after #955/#956 landed." }
  },
  {
    id: "F2",
    sev: "high",
    title: "Local git hooks aren't installed in this checkout",
    body: "scripts/hooks/{pre-push,post-commit} exist in the repo but `.git/hooks/` only contains the default `.sample` files — confirmed via `ls`. The pre-push warning on direct-to-main pushes and the post-commit tag-reminder are silently no-ops on this machine. CLAUDE.md's repo conventions assume both run.",
    fix: "Run `./scripts/hooks/install.sh` once. Longer term, consider `core.hooksPath = scripts/hooks` so a fresh clone gets them automatically without an install step (one-line `git config` per clone, but at least it's idempotent and discoverable from `git config --list`).",
    resolution: { status: "merged", pr: 955, branch: "chore/git-hooks-core-hookspath", note: "Switched install.sh / install.ps1 to a one-liner setting `core.hooksPath = scripts/hooks`; marked the hook scripts executable in the git index." }
  },
  {
    id: "F3",
    sev: "high",
    title: "release.yml's versionCode bump is never committed → collisions with the next PR",
    body: "release.yml lines 76–89 sed-replace versionCode in build.gradle.kts to N+1, build the release APK with that value, but never `git commit` or `git push`. Meanwhile version-bump-and-tag.yml has already bumped main from N to N+1 before dispatching release.yml — so release.yml builds with versionCode N+2. Main stays at N+1. The next PR merge bumps main from N+1 to N+2, which collides with the previously released APK's versionCode. Play Store rejects duplicate versionCodes; the next release upload fails. The strategy comment (lines 25–27) was written before version-bump-and-tag.yml took over the bump path and is now stale.",
    fix: "Delete the release.yml `Bump versionCode for release` step entirely. Build with whatever versionCode is on the tagged commit (which version-bump-and-tag.yml already bumped). One source of truth for versionCode = main's current value. Update the stale comment.",
    resolution: { status: "ready", pr: null, branch: "ci/release-drop-versioncode-bump", note: "Replaced the in-workflow sed-bump with a read-only step; refreshed the strategy comment. Push blocked until the gh OAuth token gets `workflow` scope." }
  },
  {
    id: "F4",
    sev: "med",
    title: "auto-merge.yml's required-checks-have-queued loop has a known broken comparison",
    body: "auto-merge.yml lines 152–155 explicitly say: `the MISSING list never empties even though CHECK_RUNS clearly contains every REQUIRED name. Likely a trim/encoding edge case in the comparison loop, but observability beats guessing`. The 90s ceiling fires `::warning::` and proceeds anyway, so this is currently cosmetic noise — but it's the second time the same workflow has shipped a known-broken loop with diagnostics-instead-of-fix (per its own comment history). Rate of false warnings on every PR.",
    fix: "Add `tr -d '[:space:]'` or `printf '%s' \"$req\" | xxd` diagnostics next iteration. Likely culprit: `echo \"$REQUIRED\" | grep -vE '^\\s*Auto-merge\\s*$'` leaves a trailing newline that `xargs` doesn't strip but `grep -qxF` does require to match. Try `printf '%s\\n' \"$REQUIRED\" | grep -Fxq -- \"$req_trimmed\"` instead of `echo`/`grep` chains.",
    resolution: { status: "ready", pr: null, branch: "fix/auto-merge-required-checks-comparison", note: "Trim with `tr -d '\\r' | sed` instead of `echo | xargs`; haystack via `printf '%s\\n'`. xxd hex dump on final-attempt warning. Push blocked on workflow scope." }
  },
  {
    id: "F5",
    sev: "med",
    title: "No supply-chain pinning beyond one action; no Dependabot / CodeQL",
    body: "Only `lewagon/wait-on-check-action` is SHA-pinned. The other 11 third-party uses (actions/checkout@v4, dorny/paths-filter@v3, reactivecircus/android-emulator-runner@v2, android-actions/setup-android@v3, gradle/actions/setup-gradle@v4, etc.) ride the major tag — anyone with push access to those tags ships code into your CI. There's also no `.github/dependabot.yml` and no CodeQL / Trivy / npm-audit workflow. SECURITY.md exists but no automation backs it.",

    resolution: { status: "merged", pr: 956, branch: "chore/dependabot", note: "Shipped Dependabot for github-actions / gradle / pip / npm; first sweep already opened #967–#976. SHA-pinning will follow Dependabot's first github-actions PR. CodeQL (part c) deferred." }
  },
  {
    id: "F6",

    title: "Backend CI provisions Postgres even on irrelevant PRs",
    body: "backend-ci.yml gates each step on `steps.relevance.outputs.backend == 'true'`, but the `services: postgres:` block is workflow-level — Docker pulls and starts postgres:16 on every PR even when no backend/** changed. ~10–15s of waste per non-backend PR.",
    fix: "Move the Postgres dependency to a separate job that's `if:`-gated on relevance, or set up Postgres inline (e.g. `docker run -d`) only when needed. Lower-effort: accept the cost — it's bounded and the simplification isn't worth churn.",
    resolution: { status: "ready", pr: null, branch: "ci/backend-postgres-gate-on-relevance", note: "Replaced workflow-level `services: postgres:` with an inline `docker run -d` step gated on the existing dorny/paths-filter relevance output; 30s pg_isready loop. Push blocked on workflow scope." }
  },
  {
    id: "F7",
    sev: "low",
    title: "Two parallel paths can both push the same release tag (idempotent guard exists, worth noting)",
    body: "Both android-ci.yml's `tag-and-release` job (push:main path for direct-to-main commits) AND version-bump-and-tag.yml (auto-merge path) can push a vX.Y.Z tag and dispatch release.yml. Each has a `git ls-remote --tags` check before pushing, so they're safe — but a hand-pushed direct-to-main commit followed within the same window by an auto-merged PR could end up with both jobs racing on the same NEW_NAME if they computed the same patch number. The dispatch-already-exists check on release.yml side closes the loop.",
    fix: "No action needed; flagging for awareness. The dual-path coverage is intentional (covers both merge styles).",
    resolution: { status: "ready", pr: null, branch: "ci/share-tag-push-concurrency-group", note: "Originally GREEN/no-action; user requested a tightening. Added a job-level `concurrency: tag-push-main, cancel-in-progress: false` to both `version-bump-and-tag` and android-ci.yml's `tag-and-release` so the critical section serializes observably. Push blocked on workflow scope." }
  },
  {
    id: "F8",
    sev: "low",

    body: "Spinning up a 1200s emulator boot ceiling + Firebase emulators to run ONE test class (MedicationCrossDeviceConvergenceTest) is expensive. The comment justifies the quarantine, but as more cross-device scenarios get added the per-class job multiplication will hurt — the same boot cost amortizes badly when only one test is run per AVD.",
    fix: "If the suite grows beyond ~3 quarantined classes, batch them via `-Pandroid.testInstrumentationRunnerArguments.package=com.averycorp.prismtask.sync.scenarios` instead of one class per job. Keep the single-class shape until then.",
    resolution: { status: "ready", pr: null, branch: "docs/cross-device-batching-threshold", note: "Documented the batch threshold (3+ classes → switch from class-args to package-args runner). No behaviour change today. Push blocked on workflow scope." }
  },
];

  date: "2026-04-30",
  // Sentinels — the audit doc itself shipped as #953.
  auditDocPr: 953,

  // `.github/workflows/*.yml` paths they touch.
  authNote: "F3, F4, F6, F7, F8 committed locally. Push to `.github/workflows/` is blocked until the gh OAuth token is refreshed with the `workflow` scope (`gh auth refresh -s workflow`). F1 PR #954 is queued behind auto-update-branch.",
};

/* ─── helpers ─────────────────────────────────────────────────────────── */

const toneClass = {
  sky:     "bg-sky-500/10 text-sky-300 ring-sky-500/30",
  emerald: "bg-emerald-500/10 text-emerald-300 ring-emerald-500/30",
  amber:   "bg-amber-500/10 text-amber-300 ring-amber-500/30",
  violet:  "bg-violet-500/10 text-violet-300 ring-violet-500/30",
  rose:    "bg-rose-500/10 text-rose-300 ring-rose-500/30",
  slate:   "bg-slate-500/10 text-slate-300 ring-slate-500/30",
  indigo:  "bg-indigo-500/10 text-indigo-300 ring-indigo-500/30",
  fuchsia: "bg-fuchsia-500/10 text-fuchsia-300 ring-fuchsia-500/30",
  cyan:    "bg-cyan-500/10 text-cyan-300 ring-cyan-500/30",
  lime:    "bg-lime-500/10 text-lime-300 ring-lime-500/30",
  orange:  "bg-orange-500/10 text-orange-300 ring-orange-500/30",
  stone:   "bg-stone-500/10 text-stone-300 ring-stone-500/30",
};

const sevTone = {
  high: "bg-red-500/15 text-red-300 ring-red-500/30",
  med:  "bg-amber-500/15 text-amber-300 ring-amber-500/30",
  low:  "bg-slate-500/15 text-slate-300 ring-slate-500/30",
};

const statusTone = {
  merged: "bg-emerald-500/15 text-emerald-300 ring-emerald-500/30",
  open:   "bg-sky-500/15 text-sky-300 ring-sky-500/30",
  ready:  "bg-amber-500/15 text-amber-300 ring-amber-500/30",
};

const statusLabel = {
  merged: "MERGED",
  open:   "PR OPEN",
  ready:  "COMMIT READY",
};

/* ─── components ──────────────────────────────────────────────────────── */

function TriggerCard({ t, isHot, onHover, onLeave }) {
  return (
    <div
      onMouseEnter={() => onHover(t.id)}
      onMouseLeave={onLeave}
      className={`rounded-xl px-3 py-2 ring-1 cursor-default transition-all ${toneClass[t.tone]} ${isHot ? "scale-[1.02] ring-2" : ""}`}
      title={t.hint}
    >
      <div className="text-[13px] font-medium leading-tight">{t.label}</div>
      <div className="text-[10px] opacity-70 mt-0.5 line-clamp-2">{t.hint}</div>
    </div>
  );
}

function WorkflowCard({ wf, hotTrigger, onHover, onLeave }) {
  const isHot = hotTrigger && wf.triggers.includes(hotTrigger);
  return (
    <div
      onMouseEnter={() => onHover(wf.id)}
      onMouseLeave={onLeave}
      className={`glow rounded-xl bg-slate-900/60 backdrop-blur ring-1 ring-white/5 p-3 transition-all ${isHot ? "ring-sky-400/50 bg-slate-900/80" : ""}`}
    >
      <div className="flex items-baseline justify-between gap-2">
        <div className="font-semibold text-[14px]">{wf.name}</div>
        <span className={`pill ring-1 ${toneClass[wf.color]}`}>{wf.jobs.length} job{wf.jobs.length !== 1 ? "s" : ""}</span>
      </div>
      <div className="text-[10px] text-slate-400 font-mono mt-0.5 truncate">{wf.file}</div>
      <ul className="mt-2 space-y-1.5">
        {wf.jobs.map((j, i) => (
          <li key={i} className="text-[12px] leading-snug">
            <div className="flex items-center gap-1.5">
              <span className="text-slate-200">{j.name}</span>
              {j.required && <span className="pill bg-red-500/15 text-red-300 ring-1 ring-red-500/30">required</span>}
            </div>
            <div className="text-[11px] text-slate-400 mt-0.5">{j.notes}</div>
          </li>
        ))}
      </ul>
    </div>
  );
}

function FindingCard({ f }) {
  const [open, setOpen] = useState(false);
  const r = f.resolution;
  return (
    <div className="rounded-xl bg-slate-900/60 ring-1 ring-white/5 p-3">
      <button onClick={() => setOpen(o => !o)} className="w-full text-left flex items-center gap-2">
        <span className={`pill ring-1 ${sevTone[f.sev]}`}>{f.sev.toUpperCase()}</span>
        <span className="font-mono text-[11px] text-slate-400">{f.id}</span>
        <span className="font-medium text-[13px] text-slate-100">{f.title}</span>
        {r && (
          <span className={`pill ring-1 ml-1 ${statusTone[r.status]}`}>
            {statusLabel[r.status]}{r.pr ? ` · #${r.pr}` : ""}
          </span>
        )}
        <span className="ml-auto text-slate-500 text-xs">{open ? "▴" : "▾"}</span>
      </button>
      {open && (
        <div className="mt-3 space-y-2 text-[12px] text-slate-300">
          <div><span className="text-slate-400">Finding —</span> {f.body}</div>
          <div><span className="text-slate-400">Fix —</span> {f.fix}</div>
          {r && (
            <div className="rounded-lg bg-slate-950/60 ring-1 ring-white/5 p-2 mt-2">
              <div className="flex items-center gap-2 text-[11px]">
                <span className={`pill ring-1 ${statusTone[r.status]}`}>{statusLabel[r.status]}</span>
                {r.pr && (
                  <a
                    href={`https://github.com/averycorp/prismTask/pull/${r.pr}`}
                    target="_blank"
                    rel="noreferrer"
                    className="text-sky-300 hover:underline"
                  >#{r.pr}</a>
                )}
                <span className="font-mono text-slate-500">{r.branch}</span>
              </div>
              {r.note && <div className="text-[12px] text-slate-300 mt-1">{r.note}</div>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}
