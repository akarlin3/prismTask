course: Embedded Firmware Sprint
duration_weeks: 4
phases:
  - name: Foundation
    week: 1
    tasks:
      - title: Set up toolchain (gcc-arm, openocd)
        priority: 4
      - title: Read STM32 reference manual chapters 1-3
        priority: 2
      - title: Order Nucleo board + sensors
        priority: 4

  - name: Bring-up
    week: 2
    tasks:
      - title: First boot + LED blink
        priority: 4
      - title: Configure UART + clock tree
        priority: 2
      - title: "EXAM: bring-up review with mentor"
        priority: 4

  - name: Application
    week: 3
    tasks:
      - title: Write I2C driver for IMU
        priority: 2
      - title: Implement 100Hz sampling loop
        priority: 2
      - title: Add SD-card data logger
        priority: 1

  - name: Integration
    week: 4
    tasks:
      - title: 4-hour battery endurance test
        priority: 2
      - title: "EXAM: final demo to advisor"
        priority: 4
      - title: Write final report
        priority: 2
