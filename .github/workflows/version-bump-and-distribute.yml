name: Version Bump & Firebase Distribute

# Audit C1 — split out from auto-merge.yml. The auto-merge job's status
# check now turns green as soon as the merge is queued, instead of
# blocking on the post-merge bump+distribute (~5 min). The merge timing
# itself is unchanged (still gated on required checks via gh pr merge
# --auto), but the workflow run completes ~5 min sooner so the PR page
# clears faster and CI minutes used by the polling loop drop.
#
# Trigger choice: workflow_run on auto-merge.yml's completion. This is
# the documented exception to the GITHUB_TOKEN-recursion rule —
# workflow_run events DO fire even when the source workflow used
# GITHUB_TOKEN internally, as long as the source workflow itself was
# triggered by a non-bot event (which auto-merge.yml is — pull_request
# from a real user). A `push` trigger on main would NOT fire because
# the squash merge push is performed via GITHUB_TOKEN.
#
# Caveat: workflow_run fires when auto-merge.yml COMPLETES, not when
# the actual merge happens. gh pr merge --auto queues the merge to run
# when required checks pass. So this workflow still polls for the PR
# to flip to MERGED before bumping (same logic as the old inline job).
#
# Caveat: this file must exist on the default branch (main) for the
# workflow_run trigger to fire. The PR that adds it can NOT use the
# new path for itself — its own version bump runs the inline job from
# the old auto-merge.yml. First post-merge cycle is unaffected.
#
# IMPORTANT: do NOT add a `branches:` filter here. For workflow_run, the
# `branches:` filter matches the SOURCE workflow's HEAD branch. Auto-
# merge & Release runs on `pull_request` events, so its HEAD branch is
# always the PR's feature branch (`feat/*`, `fix/*`, etc.) — never
# `main`. PR #771 originally shipped with `branches: [main]` here and
# the workflow never fired once until PR #794 removed the filter,
# silently breaking Firebase distribution for every merge in between.

on:
  workflow_run:
    workflows: ["Auto-merge & Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to redistribute (leave empty to skip PR-specific steps)'
        required: false
        default: ''

# Serialize all post-merge distribution work against main so concurrent
# PRs produce sequential versionCode bumps without racing each other.
concurrency:
  group: version-firebase-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  actions: read

jobs:
  version-bump-and-distribute:
    name: Version Bump, Build & Firebase Distribute
    # Skip when the source auto-merge run failed or was cancelled —
    # nothing to distribute. workflow_dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          # workflow_run.pull_requests is populated for same-repo PRs ONLY
          # when the source workflow's HEAD branch lives in the default
          # branch's repo AND GitHub's branch index for that ref still
          # points at the PR. In practice it lands EMPTY surprisingly
          # often even for vanilla same-repo PRs (observed across
          # PRs #798, #800-#802) — most likely because the auto-merge
          # workflow uses a generated GITHUB_TOKEN whose branch context
          # GitHub doesn't link back to the PR. We try this field first
          # so the fast path stays free, but always fall back to a
          # `commits/{sha}/pulls` lookup keyed on the workflow_run
          # `head_sha` so we never silently drop a bump on the floor.
          PR_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_PR: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual dispatch path — use the input if provided, otherwise
            # walk the latest merged PR on main and target that.
            if [ -n "$DISPATCH_PR" ]; then
              echo "pr_number=$DISPATCH_PR" >> "$GITHUB_OUTPUT"
              echo "found=true" >> "$GITHUB_OUTPUT"
              echo "Using PR #$DISPATCH_PR from dispatch input."
              exit 0
            fi
            PR_NUMBER=$(gh pr list --repo "$REPO" --state merged --base main \
              --limit 1 --json number -q '.[0].number // empty')
            if [ -z "$PR_NUMBER" ]; then
              echo "::warning::No merged PRs found on main. Cannot resolve PR; skipping."
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Resolved most-recent merged PR #$PR_NUMBER for dispatch run."
            exit 0
          fi

          # Path 1 — fast path: pull_requests was populated.
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Resolved PR #$PR_NUMBER from workflow_run payload."
            exit 0
          fi

          # Path 2 — fallback: look the PR up by HEAD SHA. Works in both
          # the pre-merge case (auto-merge.yml fires before the squash
          # actually happens; the open PR still has this commit at its
          # head) and the post-merge case (GitHub keeps the commit→PR
          # mapping after squash, so we still resolve correctly even if
          # the source branch was deleted). The downstream "Wait for PR
          # to merge" step handles the timing — we only need the PR
          # number here, not its merge state.
          #
          # Deliberately NOT falling back to "most recent merged PR" —
          # that race-condition-bumps a previously-merged PR if
          # workflow_run fires before the queued merge lands.
          if [ -z "$HEAD_SHA" ]; then
            echo "::warning::workflow_run.head_sha is empty; cannot resolve PR. Skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_NUMBER=$(gh api \
            "repos/$REPO/commits/$HEAD_SHA/pulls" \
            -H "Accept: application/vnd.github+json" \
            --jq 'sort_by(.number) | reverse | .[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::No PR found for commit $HEAD_SHA via commits/{sha}/pulls. Skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUMBER from commits/$HEAD_SHA/pulls fallback."

      - name: Wait for PR to merge
        id: wait
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # gh pr merge --auto may queue the merge until required checks
          # pass. Poll until MERGED, CLOSED, or timeout.
          for i in $(seq 1 60); do
            STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state -q '.state')
            case "$STATE" in
              MERGED)
                MERGE_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeCommit -q '.mergeCommit.oid')
                echo "merged=true" >> "$GITHUB_OUTPUT"
                echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
                echo "PR merged at $MERGE_SHA"
                exit 0
                ;;
              CLOSED)
                echo "merged=false" >> "$GITHUB_OUTPUT"
                echo "PR closed without merging — skipping distribution."
                exit 0
                ;;
              *)
                echo "PR state=$STATE (attempt $i/60); sleeping 10s..."
                sleep 10
                ;;
            esac
          done
          echo "merged=false" >> "$GITHUB_OUTPUT"
          echo "::warning::PR did not reach MERGED within 10 minutes — skipping distribution."

      - name: Checkout main at merge commit
        if: steps.wait.outputs.merged == 'true'
        uses: actions/checkout@v4
        with:
          # Token choice — same rationale as auto-merge.yml's
          # "Update branch if behind main" step. The bump push later in
          # this job targets `main`, which is branch-protected and rejects
          # any push that lacks the 4 required status checks. GITHUB_TOKEN
          # has no bypass-protection capability, so the bot's bump push is
          # rejected with `protected branch hook declined`. AUTOFIX_PAT
          # belongs to a repo admin (per the same secret already in use
          # by `gh pr update-branch`) and bypasses required-checks for
          # direct pushes when "Include administrators" is unchecked in
          # branch protection. Falls back to GITHUB_TOKEN if the secret
          # isn't seeded — the push will then fail loud at the
          # "Commit version bump" step rather than silently dropping.
          #
          # The token configured here propagates to every subsequent
          # `git` invocation in this job (because actions/checkout sets
          # the credential helper in the local repo config), so the
          # later `git push origin HEAD:main` picks it up automatically.
          token: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ steps.wait.outputs.merge_sha }}
          fetch-depth: 0

      # Android-changes gate removed in PR #796 — every merge now bumps,
      # builds, and distributes regardless of which paths changed. Doc-
      # only PRs still produce a versionCode bump and a Firebase release.
      # If you want to restore the gate, see git history of this file.
      #
      # Bump-before-distribute order rationale (PR after #806's run):
      # The version bump + push to main is now done BEFORE the keystore /
      # Gradle / signing / Firebase steps. Earlier the order was reversed
      # and the keystore step was a HARD-FAIL on missing secrets — when
      # KEYSTORE_BASE64 wasn't seeded the whole job exited at the
      # keystore step and the bump never reached the commit step (because
      # `Commit version bump` had `&& success()`). That made versionCode
      # silently freeze until the secrets were fixed. Now the bump is the
      # primary contract; signing + distribution are best-effort and gate
      # on the new `has_keystore` output of the soft-skip keystore step.

      # Patch bump only. release.yml owns release (minor/major) versionCode.
      - name: Bump versionCode and versionName
        if: steps.wait.outputs.merged == 'true'
        id: version
        run: |
          set -euo pipefail
          # Switch off the detached merge-sha checkout onto a local branch
          # tracking main so the later `git push HEAD:main` has somewhere
          # to go. Fetch the latest main first so we bump from the tip the
          # push will target — otherwise a concurrent PR's bump from a
          # queued run ahead of us would get overwritten.
          git fetch origin main
          git checkout -B main origin/main

          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          NEW_CODE=$(( CURRENT_CODE + 1 ))
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_CODE/" app/build.gradle.kts

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          MAJOR=$(echo "$CURRENT_NAME" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_NAME" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_NAME" | cut -d. -f3)
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/versionName = \"${CURRENT_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts

          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "Building v$NEW_NAME (build $NEW_CODE)"

      - name: Commit version bump
        # Pushes the bump commit to main BEFORE any signing/distribution
        # work, so a missing keystore can't block the bump from landing.
        # No `&& success()` guard — only depends on whether we made it
        # through the wait step.
        if: steps.wait.outputs.merged == 'true'
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/build.gradle.kts
          if git diff --cached --quiet; then
            echo "No version bump to commit"
            exit 0
          fi
          git commit -m "chore: bump to v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }}) [skip ci]"
          # Another PR merge can push to main while the build+Firebase upload is
          # running, so a straight `git push` here races and silently loses the
          # bump commit. Rebase onto the current main tip and retry on rejection.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed version bump on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing onto origin/main and retrying"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Rebase conflict while replaying version bump; aborting."
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "::error::Failed to push version bump after 5 attempts."
          exit 1

      - name: Push patch tag to fire release.yml
        # P0 sync audit follow-up to PR #850. Pushes an annotated tag
        # matching the new versionName so release.yml fires on every PR
        # merge instead of only on hand-crafted minor/major tags.
        # release.yml then handles the full signed APK + AAB build,
        # GitHub Release creation, and backend upload — keeping
        # per-merge "full release" semantics while this workflow
        # continues to own the Firebase App Distribution path.
        #
        # Tag is created from the post-bump origin/main tip we just
        # pushed (or whatever main is at if our bump was a no-op).
        # Skipped if no version_name output (bump didn't land).
        if: steps.wait.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_NAME: ${{ steps.version.outputs.version_name }}
          NEW_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail
          if [ -z "${NEW_NAME:-}" ]; then
            echo "No version_name output — bump didn't land. Skipping tag push."
            exit 0
          fi
          TAG="v${NEW_NAME}"
          # Idempotency guard: another concurrent run may have raced us
          # to push the same tag. Refusing to clobber a pre-existing tag
          # keeps the release.yml run that fired on the first push as
          # the canonical artifact source.
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists on origin; another run pushed first. Skipping."
            exit 0
          fi
          # Re-sync to the post-bump main tip so the tag points at the
          # version-bump commit we just pushed.
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git tag -a "${TAG}" -m "PrismTask v${NEW_NAME} (build ${NEW_CODE})"
          # Tag push triggers release.yml via the patch-tag filter
          # widened in the same PR. If the push races and loses, the
          # existence check above on the next run picks it up.
          for attempt in 1 2 3; do
            if git push origin "${TAG}"; then
              echo "Pushed ${TAG} on attempt ${attempt}"
              exit 0
            fi
            echo "Tag push rejected on attempt ${attempt}; retrying"
            sleep $((attempt * 2))
          done
          echo "::error::Failed to push tag ${TAG} after 3 attempts."
          exit 1

      - name: Decode signing keystore (skip if missing)
        id: keystore
        if: steps.wait.outputs.merged == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          # Soft-skip on missing keystore (revised from PR #796's
          # hard-fail). The version bump above has already landed on
          # main, so a missing keystore no longer freezes versionCode —
          # signing + distribution are best-effort downstream of the
          # `has_keystore` output. Re-seed the secrets per memory entry
          # `reference_play_upload_key.md` to re-enable signed builds.
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::KEYSTORE_BASE64 secret is not set. Version bump landed; signed release build + Firebase distribution will be skipped. Re-seed from release-keystore.jks (alias: prismtask) to re-enable. Encode with: base64 -w 0 release-keystore.jks"
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "::error::KEYSTORE_BASE64 is set but KEYSTORE_PASSWORD or KEY_ALIAS is missing. Set both alongside KEYSTORE_BASE64, or unset KEYSTORE_BASE64 to skip signing entirely."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > app/release.keystore
          # Verify the keystore + alias before any expensive Gradle work.
          keytool -list -keystore app/release.keystore -storepass "$KEYSTORE_PASSWORD" > /dev/null 2>&1 || {
            echo "::error::Keystore is invalid or corrupted. Re-encode with: base64 -w 0 your-keystore.jks"
            exit 1
          }
          keytool -list -keystore app/release.keystore -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null 2>&1 || {
            echo "::error::Key alias '$KEY_ALIAS' not found in keystore. Available aliases:"
            keytool -list -v -keystore app/release.keystore -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | grep "^Alias name:" || echo "  (keystore contains no entries)"
            exit 1
          }
          echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          echo "Keystore decoded + verified."

      - name: Set up JDK 21
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true'
        run: chmod +x gradlew

      - name: Setup Firebase credentials
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true'
        id: firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > "$RUNNER_TEMP/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "Using service account credentials for Firebase."
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "Using legacy FIREBASE_TOKEN for Firebase."
          else
            echo "::warning::No Firebase credentials found. Set FIREBASE_SERVICE_ACCOUNT (preferred) or FIREBASE_TOKEN secret to enable distribution."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true'
        run: |
          {
            echo "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})"
            echo ""
            git log -5 --pretty=format:"• %s"
          } > "$RUNNER_TEMP/release_notes.txt"

      - name: Assemble release APK (signed)
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true'
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # `-x lint -x lintVitalRelease` matches release.yml — they're not
        # gating signal at this stage and add ~2 min on top of R8.
        # `bundleRelease` produces the AAB alongside the APK so each PR
        # merge yields a Play-Store-uploadable artifact (P0 sync audit
        # PR-E). Adds ~90s to per-merge CI; acceptable at Phase F cadence.
        run: ./gradlew assembleRelease bundleRelease --no-configuration-cache --build-cache --parallel -x lint -x lintVitalRelease

      - name: Upload to Firebase App Distribution (release variant)
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true' && steps.firebase.outputs.has_credentials == 'true'
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release_notes.txt
        run: ./gradlew appDistributionUploadRelease --no-configuration-cache

      - name: Upload release APK artifact
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Upload release AAB artifact
        if: steps.wait.outputs.merged == 'true' && steps.keystore.outputs.has_keystore == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14

  capture-failure-log:
    needs: [version-bump-and-distribute]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: version-bump-and-distribute
