name: Auto-merge & Release

# Combined workflow, all running off a single pull_request trigger:
#   1. auto-merge job → waits for CI, then squash-merges via gh pr merge --auto.
#   2. version-bump-and-distribute job → waits for the squash merge to land,
#      bumps version, builds debug APK, distributes to Firebase, and commits
#      the bump.
#
# Why not a separate `push` trigger? GitHub's anti-recursion rule blocks
# workflow runs when the push to main was produced by gh pr merge using
# GITHUB_TOKEN. That silently skipped Firebase distribution for every PR
# whose only CI check was this workflow itself (i.e. the common case after
# Android CI was disabled). Driving distribution from the same pull_request
# run that performed the merge avoids the recursion gate entirely.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]
  workflow_dispatch:

env:
  WAIT_INTERVAL: 30  # seconds between CI check polls

permissions:
  contents: write        # includes push access needed by capture job for ci-logs branch
  pull-requests: write
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  # ── PR Auto-merge ─────────────────────────────────────────────────
  auto-merge:
    name: Auto-merge
    # Audit item #7 — skip `synchronize` events produced by the autofix
    # bot's auto-format commit. Those commits always carry [skip ci], so
    # kicking off another auto-merge run for them burns runner minutes
    # waiting on checks that won't re-run.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Detect whether any CI workflows were triggered
        id: ci_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Audit item #5 — poll check-runs for up to 60s instead of a bare
          # 20s sleep. On a busy runner cohort the initial 20s wasn't enough
          # for the API to reflect queued workflow runs, which could merge
          # PRs without waiting for CI. Bail out early as soon as ≥1 real
          # check shows up.
          COUNT=0
          for i in $(seq 1 6); do
            sleep 10
            COUNT=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              --jq '[.check_runs[] | select(.name != "Auto-merge")] | length')
            if [ "$COUNT" -gt 0 ]; then
              echo "Found $COUNT non-Auto-merge check(s) after ${i}0s"
              break
            fi
            echo "No non-Auto-merge checks yet (attempt $i/6)"
          done
          if [ "$COUNT" -gt 0 ]; then
            echo "has_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_ci=false" >> "$GITHUB_OUTPUT"
            echo "No CI checks on this PR after 60s — will merge without waiting."
          fi

      - name: Wait for all other CI checks to pass
        if: steps.ci_check.outputs.has_ci == 'true'
        # Audit item #9 — include `neutral` in allowed-conclusions so
        # checks that report neutral (rare but possible for skipped
        # workflows under path filters) don't block auto-merge forever.
        # Pinned to v1.3.4 SHA for supply-chain safety.
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          running-workflow-name: Auto-merge
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: ${{ env.WAIT_INTERVAL }}
          allowed-conclusions: success,skipped,neutral

      - name: Update branch if behind main
        # Audit item #4 — when the PR merged cleanly against its base but
        # its base has since advanced with a commit that makes one of the
        # PR's tests break (classic "test was fine in isolation, breaks
        # after a parallel merge"), rebase onto the new base and let the
        # re-run of CI verify it. Witnessed in PR #699 this session.
        if: steps.ci_check.outputs.has_ci == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeStateStatus -q '.mergeStateStatus')
          echo "mergeStateStatus=$STATE"
          case "$STATE" in
            BEHIND)
              echo "PR base has advanced; updating branch and re-entering check wait."
              gh pr update-branch "$PR_NUMBER" --repo "$REPO" || {
                echo "::warning::update-branch failed; continuing to merge attempt anyway."
              }
              ;;
            *)
              echo "No rebase needed."
              ;;
          esac

      - name: Merge PR (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          # Use --auto so GitHub still waits for required reviews (if any).
          # --delete-branch removes the head branch once the merge completes
          # so feature branches don't accumulate.
          # The version-bump-and-distribute job (needs: [auto-merge]) polls
          # this PR's state until it's MERGED before running.
          gh pr merge --auto --squash --delete-branch "$PR_URL" || \
            echo "Auto-merge could not be enabled (already enabled, already merged, or repo setting disabled)."

  # ── Version Bump + Firebase Distribution ──────────────────────────
  # Runs on the same pull_request event as auto-merge (NOT a push event),
  # so it still fires when the squash merge was performed via GITHUB_TOKEN.
  # Waits for the PR to transition to MERGED, then bumps versionCode /
  # versionName on main, builds the debug APK, uploads to Firebase, and
  # commits the bump back to main.
  version-bump-and-distribute:
    name: Version Bump, Build & Firebase Distribute
    needs: [auto-merge]
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Serialize all post-merge distribution work against main so concurrent
    # PRs produce sequential versionCode bumps without racing each other.
    concurrency:
      group: version-firebase-main
      cancel-in-progress: false

    steps:
      - name: Wait for PR to merge
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # gh pr merge --auto may queue the merge (waiting on other required
          # checks, reviews, or branch-protection rules) or execute it
          # immediately. Poll PR state until it flips to MERGED, CLOSED
          # (without merging), or we give up. Matches the outer workflow
          # timeout so a stuck PR doesn't hang the runner forever.
          for i in $(seq 1 60); do
            STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state -q '.state')
            case "$STATE" in
              MERGED)
                MERGE_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeCommit -q '.mergeCommit.oid')
                echo "merged=true" >> "$GITHUB_OUTPUT"
                echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
                echo "PR merged at $MERGE_SHA"
                exit 0
                ;;
              CLOSED)
                echo "merged=false" >> "$GITHUB_OUTPUT"
                echo "PR closed without merging — skipping distribution."
                exit 0
                ;;
              *)
                echo "PR state=$STATE (attempt $i/60); sleeping 10s..."
                sleep 10
                ;;
            esac
          done
          echo "merged=false" >> "$GITHUB_OUTPUT"
          echo "::warning::PR did not reach MERGED within 10 minutes — skipping distribution."

      - name: Checkout main at merge commit
        if: steps.wait.outputs.merged == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ steps.wait.outputs.merge_sha }}
          fetch-depth: 0

      - name: Detect Android-related changes
        if: steps.wait.outputs.merged == 'true'
        id: changes
        env:
          MERGE_SHA: ${{ steps.wait.outputs.merge_sha }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "${MERGE_SHA}~1" "${MERGE_SHA}")
          if echo "$CHANGED" | grep -qE '^(app/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradle/|gradlew)'; then
            echo "has_android=true" >> "$GITHUB_OUTPUT"
            echo "Android-related changes detected:"
            echo "$CHANGED" | grep -E '^(app/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradle/|gradlew)' | head -20
          else
            echo "has_android=false" >> "$GITHUB_OUTPUT"
            echo "No Android-related changes — skipping build & distribution."
          fi

      - name: Set up JDK 21
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true'
        run: chmod +x gradlew

      # Patch bump only. release.yml owns release (minor/major) versionCode.
      - name: Bump versionCode and versionName
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true'
        id: version
        run: |
          set -euo pipefail
          # Switch off the detached merge-sha checkout onto a local branch
          # tracking main so the later `git push HEAD:main` has somewhere
          # to go. Fetch the latest main first so we bump from the tip the
          # push will target — otherwise a concurrent PR's bump from a
          # queued run ahead of us would get overwritten.
          git fetch origin main
          git checkout -B main origin/main

          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          NEW_CODE=$(( CURRENT_CODE + 1 ))
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_CODE/" app/build.gradle.kts

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          MAJOR=$(echo "$CURRENT_NAME" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_NAME" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_NAME" | cut -d. -f3)
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/versionName = \"${CURRENT_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts

          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "Building v$NEW_NAME (build $NEW_CODE)"

      - name: Setup Firebase credentials
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true'
        id: firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > "$RUNNER_TEMP/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "Using service account credentials for Firebase."
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "Using legacy FIREBASE_TOKEN for Firebase."
          else
            echo "::warning::No Firebase credentials found. Set FIREBASE_SERVICE_ACCOUNT (preferred) or FIREBASE_TOKEN secret to enable distribution."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true'
        run: |
          {
            echo "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})"
            echo ""
            git log -5 --pretty=format:"• %s"
          } > "$RUNNER_TEMP/release_notes.txt"

      - name: Assemble debug APK
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true'
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: Upload to Firebase App Distribution
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true' && steps.firebase.outputs.has_credentials == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release_notes.txt
        run: ./gradlew appDistributionUploadDebug --no-configuration-cache

      - name: Upload debug APK artifact
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Commit version bump
        if: steps.wait.outputs.merged == 'true' && steps.changes.outputs.has_android == 'true' && success()
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/build.gradle.kts
          if git diff --cached --quiet; then
            echo "No version bump to commit"
            exit 0
          fi
          git commit -m "chore: bump to v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }}) [skip ci]"
          # Another PR merge can push to main while the build+Firebase upload is
          # running, so a straight `git push` here races and silently loses the
          # bump commit. Rebase onto the current main tip and retry on rejection.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed version bump on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing onto origin/main and retrying"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Rebase conflict while replaying version bump; aborting."
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "::error::Failed to push version bump after 5 attempts."
          exit 1

  capture-failure-log:
    needs: [auto-merge, version-bump-and-distribute]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: auto-merge
