name: Auto-merge & Release

# Combined workflow:
#   1. On pull_request ‚Üí waits for CI, then squash-merges via auto-merge.
#   2. On push to main (the merge) ‚Üí bumps version, builds debug APK,
#      distributes to Firebase App Distribution, and commits the bump.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]
  push:
    branches: [main]
    # No paths filter here ‚Äî change detection is done in-job via git diff.
    # GitHub's push-event path filtering can miss squash-merge changes and
    # doesn't trigger when auto-merge uses GITHUB_TOKEN.

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  # ‚îÄ‚îÄ PR Auto-merge ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  auto-merge:
    name: Auto-merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Wait for all other CI checks to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          running-workflow-name: Auto-merge
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          allowed-conclusions: success,skipped

      - name: Merge PR (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          # Use --auto so GitHub still waits for required reviews (if any).
          # Once the merge completes, the push to main triggers the
          # version-bump-and-distribute job below.
          gh pr merge --auto --squash "$PR_URL" || \
            echo "Auto-merge could not be enabled (already enabled, already merged, or repo setting disabled)."

  # ‚îÄ‚îÄ Post-merge: Version Bump + Firebase Distribution ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  version-bump-and-distribute:
    name: Version Bump, Build & Firebase Distribute
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: version-firebase-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Skip if triggered by version bump commit
        id: skip_check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ‚Äî last commit was a CI version bump."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Android-related changes
        if: steps.skip_check.outputs.skip != 'true'
        id: changes
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -qE '^(app/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradle/|gradlew)'; then
            echo "has_android=true" >> "$GITHUB_OUTPUT"
            echo "Android-related changes detected:"
            echo "$CHANGED" | grep -E '^(app/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradle/|gradlew)' | head -20
          else
            echo "has_android=false" >> "$GITHUB_OUTPUT"
            echo "No Android-related changes ‚Äî skipping build & distribution."
          fi

      - name: Set up JDK 21
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        run: chmod +x gradlew

      - name: Bump versionCode and versionName
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        id: version
        run: |
          set -euo pipefail
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          NEW_CODE=$(( CURRENT_CODE + 1 ))
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_CODE/" app/build.gradle.kts

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          MAJOR=$(echo "$CURRENT_NAME" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_NAME" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_NAME" | cut -d. -f3)
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/versionName = \"${CURRENT_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts

          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "Building v$NEW_NAME (build $NEW_CODE)"

      - name: Setup Firebase credentials
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        id: firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > "$RUNNER_TEMP/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "Using service account credentials for Firebase."
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "Using legacy FIREBASE_TOKEN for Firebase."
          else
            echo "::warning::No Firebase credentials found. Set FIREBASE_SERVICE_ACCOUNT (preferred) or FIREBASE_TOKEN secret to enable distribution."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        run: |
          {
            echo "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})"
            echo ""
            git log -5 --pretty=format:"‚Ä¢ %s"
          } > "$RUNNER_TEMP/release_notes.txt"

      - name: Assemble debug APK
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: Upload to Firebase App Distribution
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true' && steps.firebase.outputs.has_credentials == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release_notes.txt
        run: ./gradlew appDistributionUploadDebug --no-configuration-cache

      - name: Upload debug APK artifact
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Commit version bump
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true' && success()
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/build.gradle.kts
          git diff --cached --quiet && echo "No version bump to commit" || (
            git commit -m "chore: bump to v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }}) [skip ci]" &&
            git push
          )
