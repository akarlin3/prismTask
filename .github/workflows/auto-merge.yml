name: Auto-merge & Release

# Combined workflow:
#   1. On pull_request → waits for CI, then squash-merges via auto-merge.
#   2. On push to main (after the merge) → bumps version, builds debug APK,
#      distributes to Firebase App Distribution, and commits the bump.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]
  push:
    branches: [main]
    # No paths filter here — change detection is done in-job via git diff.
    # GitHub's push-event path filtering can miss squash-merge changes and
    # doesn't trigger when auto-merge uses GITHUB_TOKEN.

env:
  WAIT_INTERVAL: 30  # seconds between CI check polls

permissions:
  contents: write        # includes push access needed by capture job for ci-logs branch
  pull-requests: write
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  # ── PR Auto-merge ─────────────────────────────────────────────────
  auto-merge:
    name: Auto-merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Wait for all other CI checks to pass
        # Pinned to v1.3.4 SHA for supply-chain safety
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          running-workflow-name: Auto-merge
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: ${{ env.WAIT_INTERVAL }}
          allowed-conclusions: success,skipped

      - name: Merge PR (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          # Use --auto so GitHub still waits for required reviews (if any).
          # Once the merge completes, the push to main triggers the
          # version-bump-and-distribute job below.
          gh pr merge --auto --squash "$PR_URL" || \
            echo "Auto-merge could not be enabled (already enabled, already merged, or repo setting disabled)."

  # ── Version Bump + Firebase Distribution ──────────────────────────
  # Only runs on push to main (after auto-merge completes).
  # Bumps version, builds debug APK, distributes to Firebase, and
  # commits the version bump.
  version-bump-and-distribute:
    name: Version Bump, Build & Firebase Distribute
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Queue runs (do NOT cancel in progress). Cancelling mid-flight drops
    # Firebase distributions for Android-changing PRs when a second push
    # lands before the first run finishes.
    concurrency:
      group: version-firebase-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Skip if triggered by version bump commit
        id: skip_check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Inspect the triggering commit, not HEAD. When runs queue, main
          # may have advanced past the triggering commit (e.g. to a bump
          # commit from an earlier run), and we don't want to misread that.
          if echo "$COMMIT_MSG" | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping — triggering commit was a CI version bump."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Android-related changes
        if: steps.skip_check.outputs.skip != 'true'
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Diff the exact push range, not HEAD~1..HEAD. When this run is
          # queued behind another, HEAD on main may have advanced and
          # HEAD~1..HEAD would describe a later push's changes instead of
          # this one's.
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")
          fi
          if echo "$CHANGED" | grep -qE '^(app/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradle/|gradlew)'; then
            echo "has_android=true" >> "$GITHUB_OUTPUT"
            echo "Android-related changes detected:"
            echo "$CHANGED" | grep -E '^(app/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradle/|gradlew)' | head -20
          else
            echo "has_android=false" >> "$GITHUB_OUTPUT"
            echo "No Android-related changes — skipping build & distribution."
          fi

      - name: Set up JDK 21
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        run: chmod +x gradlew

      # Patch bump only. release.yml owns release (minor/major) versionCode.
      - name: Bump versionCode and versionName
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        id: version
        run: |
          set -euo pipefail
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          NEW_CODE=$(( CURRENT_CODE + 1 ))
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_CODE/" app/build.gradle.kts

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          MAJOR=$(echo "$CURRENT_NAME" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_NAME" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_NAME" | cut -d. -f3)
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/versionName = \"${CURRENT_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts

          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "Building v$NEW_NAME (build $NEW_CODE)"

      - name: Setup Firebase credentials
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        id: firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > "$RUNNER_TEMP/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "Using service account credentials for Firebase."
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "Using legacy FIREBASE_TOKEN for Firebase."
          else
            echo "::warning::No Firebase credentials found. Set FIREBASE_SERVICE_ACCOUNT (preferred) or FIREBASE_TOKEN secret to enable distribution."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        run: |
          {
            echo "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})"
            echo ""
            git log -5 --pretty=format:"• %s"
          } > "$RUNNER_TEMP/release_notes.txt"

      - name: Assemble debug APK
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true'
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: Upload to Firebase App Distribution
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true' && steps.firebase.outputs.has_credentials == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release_notes.txt
        run: ./gradlew appDistributionUploadDebug --no-configuration-cache

      - name: Upload debug APK artifact
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Commit version bump
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.has_android == 'true' && success()
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/build.gradle.kts
          git diff --cached --quiet && echo "No version bump to commit" || (
            git commit -m "chore: bump to v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }}) [skip ci]" &&
            git push
          )

  capture-failure-log:
    needs: [auto-merge, version-bump-and-distribute]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: capture
        uses: ./.github/actions/capture-failure-log
        with:
          workflow-slug: auto-merge
      - uses: ./.github/actions/commit-ci-log
        with:
          workflow-slug: auto-merge
          log-path: ${{ steps.capture.outputs.log-path }}
