name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  # Pull-request trigger is intentionally unfiltered: branch protection
  # requires the `test` status to post, so the workflow must run on every
  # PR even if no backend code changed. Relevance is re-checked inside
  # the job via dorny/paths-filter — irrelevant PRs short-circuit within
  # a few seconds rather than booting Postgres + installing deps.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # capture job pushes to ci-logs branch
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  test:
    # Required status check for branch protection: must post even on PRs
    # that don't touch `backend/**`. Postgres service + pytest only run
    # when `relevance.outputs.backend` is true.
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: averytask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/averytask_test
      JWT_SECRET_KEY: test-secret-key
      ENVIRONMENT: dev
      # Placeholder — prevents import errors in tests that initialize the Anthropic client
      ANTHROPIC_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: relevance
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'
      - name: Short-circuit (no backend changes)
        if: steps.relevance.outputs.backend != 'true'
        run: echo "✓ No backend paths changed; test job is a no-op."

      - name: Set up Python 3.11
        if: steps.relevance.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: steps.relevance.outputs.backend == 'true'
        run: pip install -r requirements.txt

      - name: Lint with ruff
        if: steps.relevance.outputs.backend == 'true'
        run: ruff check app/ tests/

      - name: Run Alembic migrations
        if: steps.relevance.outputs.backend == 'true'
        run: alembic upgrade head

      - name: Run tests
        # `-x` stops at the first failure, but we still emit a JUnit XML so the
        # verify step below has something to inspect. `--junitxml` writes one
        # report per pytest invocation regardless of pass/fail.
        if: steps.relevance.outputs.backend == 'true'
        run: pytest tests/ -x --tb=short -q --junitxml=junit.xml

      - name: Verify unit-test results (XML)
        # Belt-and-suspenders: even if pytest's exit code somehow ends up zero,
        # a <testsuite> reporting non-zero `failures` or `errors` fails the
        # step. Also fails fast if the XML wasn't produced (pytest never ran).
        if: always() && steps.relevance.outputs.backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          xmls=(junit.xml tests/**/*.xml)
          if [ ${#xmls[@]} -eq 0 ]; then
            echo "::error::No JUnit XML results found in backend/. Did pytest run?"
            exit 1
          fi
          failed=0
          for f in "${xmls[@]}"; do
            fails=$(grep -oE 'failures="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            errs=$(grep -oE 'errors="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            if [ "${fails:-0}" -gt 0 ] || [ "${errs:-0}" -gt 0 ]; then
              echo "::error file=${f}::${fails} failure(s), ${errs} error(s) in ${f}"
              failed=$((failed + fails + errs))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::${failed} backend-test failure(s)/error(s) detected. See annotations and the test-results artifact."
            exit 1
          fi
          echo "All ${#xmls[@]} JUnit XML reports clean."

      - name: Upload test results
        if: always() && steps.relevance.outputs.backend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/junit.xml
          retention-days: 7
          if-no-files-found: ignore

  capture-failure-log:
    needs: [test]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: backend-ci
