name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
      - '.github/actions/setup-node-web/**'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
      - '.github/actions/setup-node-web/**'
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # capture job pushes to ci-logs branch
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-web
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build

  e2e:
    needs: lint-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-web

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # Key on Playwright version so cache invalidates on upgrades
          key: playwright-chromium-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  capture-failure-log:
    needs: [lint-and-test, e2e]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: capture
        uses: ./.github/actions/capture-failure-log
        with:
          workflow-slug: web-ci
      - uses: ./.github/actions/commit-ci-log
        with:
          workflow-slug: web-ci
          log-path: ${{ steps.capture.outputs.log-path }}
