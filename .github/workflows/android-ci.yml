name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    name: Auto-fix (ktlint + detekt)
    # Only run on PRs — main pushes go straight to build/test to save ~1-2 min.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ktlint auto-format
        run: ./gradlew ktlintFormat --continue
        continue-on-error: true

      - name: detekt auto-correct
        run: ./gradlew detekt --auto-correct --continue
        continue-on-error: true

      - name: Commit formatting fixes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet && echo "No formatting changes to commit" || (
            git add -A &&
            git commit -m "style: auto-fix ktlint + detekt formatting [skip ci]" &&
            git push
          )

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ktlint + detekt check
        run: ./gradlew ktlintCheck detekt --continue --no-configuration-cache
        continue-on-error: true

      - name: Lint + Unit tests
        run: ./gradlew lint testDebugUnitTest --no-configuration-cache

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

  detect-app-changes:
    name: Detect App Changes
    # Main-push only: determine whether to build a new APK by diffing app/
    # and Gradle build files between the push's before/after SHAs.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.check.outputs.app_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Check for app changes since last push
        id: check
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          # Branch creation or unknown prior SHA — build to be safe.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO_SHA" ]; then
            echo "No prior commit on record — treating as app changed."
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "Before commit $BEFORE not reachable — treating as app changed."
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- \
            'app/**' \
            'build.gradle.kts' \
            'settings.gradle.kts' \
            'gradle.properties' \
            'gradle/**' \
            'gradlew' \
            'gradlew.bat' || true)

          if [ -n "$CHANGED" ]; then
            echo "App changes detected:"
            echo "$CHANGED"
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No app or Gradle changes between $BEFORE and $AFTER — skipping APK build."
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
          fi

  assemble-and-distribute:
    name: Assemble & Distribute
    # Main-push only: version bump + APK build + Firebase distribution.
    # Runs in parallel with lint-and-test to minimize wall-clock time.
    needs: detect-app-changes
    if: github.event_name == 'push' && needs.detect-app-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Bump versionCode and versionName
        id: version
        run: |
          set -euo pipefail
          OFFSET=200
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          CANDIDATE=$(( OFFSET + ${{ github.run_number }} ))
          if [ "$CANDIDATE" -le "$CURRENT_CODE" ]; then
            NEW_CODE=$(( CURRENT_CODE + 1 ))
          else
            NEW_CODE=$CANDIDATE
          fi
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_CODE/" app/build.gradle.kts

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          MAJOR=$(echo "$CURRENT_NAME" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_NAME" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_NAME" | cut -d. -f3)
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/versionName = \"${CURRENT_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts

          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "Building v$NEW_NAME (build $NEW_CODE)"

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Commit version bump
        if: success() && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/build.gradle.kts
          git diff --cached --quiet && echo "No version bump to commit" || (
            git commit -m "chore: bump to v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }}) [skip ci]" &&
            git push
          )

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app 1:403186103462:android:59c861c84c76969b47b067 \
            --groups testers \
            --release-notes "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }}) from commit ${{ github.sha }}" \
            --token "$FIREBASE_TOKEN"
