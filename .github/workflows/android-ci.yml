name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android-ci.yml'
      - '.github/actions/setup-android/**'
  # Pull-request trigger is intentionally unfiltered: branch protection
  # requires the `lint-and-test` status to post, and if `paths:` filters
  # the workflow out the status never posts and the PR blocks forever.
  # Relevance is re-checked *inside* the job via dorny/paths-filter so
  # an unrelated PR short-circuits after a few seconds rather than
  # running the full Gradle suite.
  pull_request:
    branches: [main]

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # autofix needs to commit; capture job pushes to ci-logs branch
  pull-requests: read
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  # lint-and-test depends on autofix so it checks the post-autofix head,
  # not the pre-fix merge commit. The autofix commit intentionally does NOT
  # carry [skip ci]: branch protection posts required statuses against the
  # PR's head SHA, and [skip ci] prevented every workflow — including
  # required checks (lint-and-test, connected-tests, backend test, web
  # lint-and-test) — from ever running on the autofix commit. That left PRs
  # stuck with pending required checks forever (e.g. sync-tests PRs
  # #749/#751/#753, which had to be admin-merged). The one extra android-ci
  # cycle on the bot's push is cheap — on the re-run, autofix finds nothing
  # to commit and only the fast ktlint/detekt steps run.
  autofix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      # Skip the Gradle cold-start entirely when the PR doesn't touch
      # Android code — saves ~2 min per irrelevant PR. Relevance pattern
      # must stay in sync with the `paths:` list on the `push:` trigger
      # above.
      - uses: dorny/paths-filter@v3
        id: relevance
        with:
          filters: |
            android:
              - 'app/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/android-ci.yml'
              - '.github/actions/setup-android/**'
      - name: Short-circuit (no Android changes)
        if: steps.relevance.outputs.android != 'true'
        run: echo "✓ No Android paths changed; autofix is a no-op."
      - uses: ./.github/actions/setup-android
        if: steps.relevance.outputs.android == 'true'
      - name: ktlint auto-format
        id: ktlint_format
        if: steps.relevance.outputs.android == 'true'
        run: ./gradlew ktlintFormat --continue
      - name: detekt auto-correct
        id: detekt_autocorrect
        if: always() && steps.relevance.outputs.android == 'true'
        run: ./gradlew detekt --auto-correct --continue
      # Commit message intentionally does NOT include [skip ci]. See the
      # header comment on this job for the full rationale — TL;DR: branch
      # protection's required statuses post against the head SHA, and
      # [skip ci] prevents the required-check workflows from running on
      # the autofix commit, which deadlocks the PR. Auto-merge already
      # skips bot synchronize events via `sender.type != 'Bot'`, so
      # there's no risk of auto-merge looping on the re-trigger.
      # Runs even if the auto-fix steps exited non-zero so partial fixes
      # still get committed, but the job as a whole still fails so
      # unfixable issues aren't silently ignored.
      - name: Commit formatting fixes
        if: always() && steps.relevance.outputs.android == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "style: auto-format" && git push)
      # Audit item #8 — run ktlintCheck here (not in lint-and-test) so
      # non-auto-correctable violations (e.g. comments inside
      # value_argument_list) fail THIS job. Saves a Gradle cold-start and
      # ~2 min per PR cycle vs. running it again in lint-and-test. Uses
      # `if: always()` so it runs even if auto-correct steps reported
      # non-zero — the goal is for this final check to be the
      # authoritative ktlint verdict.
      - name: ktlint check (authoritative)
        if: always() && steps.relevance.outputs.android == 'true'
        run: ./gradlew ktlintCheck --continue

  lint-and-test:
    # Wait for autofix so we verify the post-autofix code. For push events
    # autofix is skipped; `!cancelled()` lets this job run anyway. The checkout
    # ref follows the PR head branch (after autofix's push) or falls back to
    # the pushed ref.
    #
    # This job is a required status check in branch protection, so it must
    # always post a result — even on PRs that don't touch Android code.
    # The `relevance` filter below gates the actual Gradle work; an
    # irrelevant PR returns success within seconds.
    #
    # Audit item #8 — ktlintCheck now lives in the autofix job (PR runs)
    # OR the detekt step below (push runs); either way it runs exactly
    # once per workflow run.
    needs: [autofix]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: dorny/paths-filter@v3
        id: relevance
        with:
          filters: |
            android:
              - 'app/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/android-ci.yml'
              - '.github/actions/setup-android/**'
      - name: Short-circuit (no Android changes)
        if: steps.relevance.outputs.android != 'true'
        run: echo "✓ No Android paths changed; lint-and-test is a no-op."
      - uses: ./.github/actions/setup-android
        if: steps.relevance.outputs.android == 'true'
      # ktlintCheck runs in autofix for PR events; for push events autofix
      # is skipped so we fall back to running it here.
      - name: ktlint check (push events only)
        if: github.event_name != 'pull_request' && steps.relevance.outputs.android == 'true'
        run: ./gradlew ktlintCheck --continue
      - name: detekt
        if: always() && steps.relevance.outputs.android == 'true'
        run: ./gradlew detekt --continue
      - name: Android lint
        if: always() && steps.relevance.outputs.android == 'true'
        run: ./gradlew lint --continue
      - name: Unit tests
        # `set -o pipefail` is on by default in GitHub's bash shell, but we
        # make it explicit so a regression in the shell config can't hide a
        # non-zero Gradle exit behind `tee`. `--continue` lets Gradle finish
        # every test task so the XML reports we inspect below are complete.
        # `-i` (info) makes Gradle print each test class as it starts, so a
        # hung test shows which class it was on. 20-minute step timeout
        # turns an indefinite hang into a reported failure (the codebase's
        # historical test runtime is ~5 min).
        if: steps.relevance.outputs.android == 'true'
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew testDebugUnitTest --continue -i 2>&1 | tee unit-test-output.log
      - name: Verify unit-test results (XML)
        # Belt-and-suspenders: even if Gradle's exit code somehow ends up zero,
        # a single <testsuite> reporting non-zero `failures` or `errors` fails
        # the step. Catches configurations where `ignoreFailures = true` is
        # added to a module, `tee`/shell changes swallow the exit code, or a
        # custom test task reports failures via XML without propagating them.
        if: always() && steps.relevance.outputs.android == 'true'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          xmls=(app/build/test-results/**/*.xml)
          if [ ${#xmls[@]} -eq 0 ]; then
            echo "::error::No JUnit XML results found under app/build/test-results/. Did the test task run?"
            exit 1
          fi
          failed=0
          for f in "${xmls[@]}"; do
            fails=$(grep -oE 'failures="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            errs=$(grep -oE 'errors="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            if [ "${fails:-0}" -gt 0 ] || [ "${errs:-0}" -gt 0 ]; then
              echo "::error file=${f}::${fails} failure(s), ${errs} error(s) in ${f}"
              failed=$((failed + fails + errs))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::${failed} unit-test failure(s)/error(s) detected. See annotations and the test-results artifact."
            exit 1
          fi
          echo "All ${#xmls[@]} JUnit XML reports clean."
      - name: Post failure details to PR
        if: failure() && github.event_name == 'pull_request' && steps.relevance.outputs.android == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### CI Unit Test Failure\n\n';
            try {
              const raw = fs.readFileSync('unit-test-output.log', 'utf8');
              const lines = raw.split('\n');
              const errorLines = lines.filter(l =>
                /\be:\b|FAILED|Compilation error|Unresolved reference|not abstract|does not implement/.test(l)
              );
              const tail = lines.slice(-30).join('\n');
              const errors = errorLines.length > 0
                ? errorLines.join('\n')
                : 'No specific error lines matched. Last 30 lines shown.';
              body += '**Error lines:**\n```\n' + errors.slice(0, 2000) + '\n```\n';
              body += '\n**Build tail:**\n```\n' + tail.slice(0, 2000) + '\n```';
            } catch (e) {
              body += 'Could not read unit-test-output.log: ' + e.message;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Upload lint report
        if: always() && steps.relevance.outputs.android == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
      - name: Upload detekt report
        if: always() && steps.relevance.outputs.android == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 7
      - name: Upload test results
        if: always() && steps.relevance.outputs.android == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/
          retention-days: 7

  # Distribute a debug APK to Firebase App Distribution for PRs that ask
  # for it (audit item #6 — label-gated to avoid spending runner minutes
  # on double uploads for every PR). Apply the `firebase-pr-build` label
  # when testers explicitly want a per-PR build. Main-push distribution
  # is unchanged — auto-merge.yml's version-bump-and-distribute produces
  # an authoritative-versionCode build for every merged PR.
  #
  # The overlay versionCode (PR# × 1000 + current) ensures Firebase sees
  # each PR push as a distinct release; the overlay is NOT committed back
  # to the PR branch.
  firebase-distribute:
    needs: [lint-and-test]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'firebase-pr-build')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PR head SHA so autofix commits from the same run aren't
          # accidentally pulled in by a moving `head_ref`.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-android

      - name: Overlay PR versionCode + versionName suffix
        id: version
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          BUILD_FILE="app/build.gradle.kts"
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$BUILD_FILE" | head -1)
          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$BUILD_FILE" | head -1)
          SHORT_SHA="${HEAD_SHA:0:7}"
          # versionCode must be unique per Firebase release; add PR number so
          # concurrent PRs don't collide on the same code. Name carries the
          # PR + SHA so testers can tell which PR a build came from.
          NEW_CODE=$(( CURRENT_CODE + PR_NUMBER * 1000 ))
          NEW_NAME="${CURRENT_NAME}-pr${PR_NUMBER}.${SHORT_SHA}"
          sed -i -E "s/(versionCode\s*=\s*)[0-9]+/\1${NEW_CODE}/" "$BUILD_FILE"
          sed -i -E "s/(versionName\s*=\s*\")[^\"]+(\")/\1${NEW_NAME}\2/" "$BUILD_FILE"
          echo "Overlaid: v${NEW_NAME} (build ${NEW_CODE})"
          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"

      - name: Setup Firebase credentials
        id: firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > "$RUNNER_TEMP/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No Firebase credentials found. Set FIREBASE_SERVICE_ACCOUNT (preferred) or FIREBASE_TOKEN to enable distribution."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.firebase.outputs.has_credentials == 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})"
            echo "PR #${{ github.event.pull_request.number }}: ${PR_TITLE}"
            echo "${PR_URL}"
            echo ""
            git log -5 --pretty=format:"• %s"
          } > "$RUNNER_TEMP/release_notes.txt"

      - name: Assemble debug APK
        if: steps.firebase.outputs.has_credentials == 'true'
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: Upload to Firebase App Distribution
        if: steps.firebase.outputs.has_credentials == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release_notes.txt
        run: ./gradlew appDistributionUploadDebug --no-configuration-cache

      - name: Upload debug APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-pr${{ github.event.pull_request.number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: ignore

  capture-failure-log:
    needs: [autofix, lint-and-test, firebase-distribute]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: android-ci
