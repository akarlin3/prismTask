name: Android CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      IS_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bump version
        id: bump
        if: env.IS_MAIN_PUSH == 'true'
        run: |
          set -euo pipefail
          BUILD_FILE="app/build.gradle.kts"

          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$BUILD_FILE" | head -1)
          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$BUILD_FILE" | head -1)

          if [[ ! "$CURRENT_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::versionName '$CURRENT_NAME' must match MAJOR.MINOR.PATCH"
            exit 1
          fi

          NEW_CODE=$((CURRENT_CODE + 1))
          NEW_NAME="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"

          sed -i -E "s/(versionCode\s*=\s*)[0-9]+/\1${NEW_CODE}/" "$BUILD_FILE"
          sed -i -E "s/(versionName\s*=\s*\")[^\"]+(\")/\1${NEW_NAME}\2/" "$BUILD_FILE"

          echo "Bumped: v$CURRENT_NAME ($CURRENT_CODE) -> v$NEW_NAME ($NEW_CODE)"
          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"

      - name: Build debug APK and run unit tests
        run: ./gradlew assembleDebug testDebugUnitTest --build-cache --parallel -x lint -x lintVitalRelease

      - name: Compute release tag
        id: tag
        if: env.IS_MAIN_PUSH == 'true'
        env:
          BASE_TAG: v${{ steps.bump.outputs.version_name }}
        run: |
          set -euo pipefail
          EXISTING=$(git ls-remote --tags origin "refs/tags/${BASE_TAG}" "refs/tags/${BASE_TAG}-build.*" \
            | awk '{print $2}' | sed -e 's|refs/tags/||' -e 's|\^{}$||' | sort -u)

          if ! echo "$EXISTING" | grep -qx "$BASE_TAG"; then
            TAG="$BASE_TAG"
          else
            HIGHEST=$(echo "$EXISTING" \
              | { grep -E "^${BASE_TAG}-build\.[0-9]+$" || true; } \
              | sed -E "s/.*-build\.([0-9]+)$/\1/" | sort -n | tail -1)
            TAG="${BASE_TAG}-build.$(( ${HIGHEST:-1} + 1 ))"
          fi

          echo "Release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: env.IS_MAIN_PUSH == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Automated debug build for v${{ steps.bump.outputs.version_name }} (build ${{ steps.bump.outputs.version_code }}).

            Commit: ${{ github.sha }}
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Firebase App Distribution
        if: env.IS_MAIN_PUSH == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app 1:403186103462:android:919c46244d4a7f5f47b067 \
            --groups testers \
            --release-notes "v${{ steps.bump.outputs.version_name }} (build ${{ steps.bump.outputs.version_code }}) from commit ${{ github.sha }}" \
            --token "$FIREBASE_TOKEN"

      - name: Commit version bump and debug APK
        if: env.IS_MAIN_PUSH == 'true'
        run: |
          set -euo pipefail
          cp app/build/outputs/apk/debug/app-debug.apk app-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-debug.apk app/build.gradle.kts
          git diff --cached --quiet || git commit -m "chore: bump to v${{ steps.bump.outputs.version_name }} (build ${{ steps.bump.outputs.version_code }}) [skip ci]"
          git pull --rebase origin main || true
          git push
