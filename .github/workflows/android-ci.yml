name: Android CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android-ci.yml'
      - '.github/actions/setup-android/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android-ci.yml'
      - '.github/actions/setup-android/**'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # autofix needs to commit; capture job pushes to ci-logs branch
  pull-requests: read
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  # autofix and lint-and-test run in parallel (no needs: between them).
  # The autofix commit uses [skip ci] to avoid re-triggering this workflow,
  # which mitigates the race condition with the lint-and-test job.
  autofix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-android
      - name: ktlint auto-format
        id: ktlint_format
        run: ./gradlew ktlintFormat --continue
      - name: detekt auto-correct
        id: detekt_autocorrect
        if: always()
        run: ./gradlew detekt --auto-correct --continue
      # Commits with [skip ci] to avoid re-triggering this workflow.
      # Runs even if the auto-fix steps exited non-zero so partial fixes
      # still get committed, but the job as a whole still fails so
      # unfixable issues aren't silently ignored.
      - name: Commit formatting fixes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "style: auto-format [skip ci]" && git push)

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
      - name: ktlint check
        run: ./gradlew ktlintCheck --continue
      - name: detekt
        if: always()
        run: ./gradlew detekt --continue
      - name: Android lint
        if: always()
        run: ./gradlew lint --continue
      - name: Unit tests
        # `set -o pipefail` is on by default in GitHub's bash shell, but we
        # make it explicit so a regression in the shell config can't hide a
        # non-zero Gradle exit behind `tee`. `--continue` lets Gradle finish
        # every test task so the XML reports we inspect below are complete.
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew testDebugUnitTest --continue 2>&1 | tee unit-test-output.log
      - name: Verify unit-test results (XML)
        # Belt-and-suspenders: even if Gradle's exit code somehow ends up zero,
        # a single <testsuite> reporting non-zero `failures` or `errors` fails
        # the step. Catches configurations where `ignoreFailures = true` is
        # added to a module, `tee`/shell changes swallow the exit code, or a
        # custom test task reports failures via XML without propagating them.
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          xmls=(app/build/test-results/**/*.xml)
          if [ ${#xmls[@]} -eq 0 ]; then
            echo "::error::No JUnit XML results found under app/build/test-results/. Did the test task run?"
            exit 1
          fi
          failed=0
          for f in "${xmls[@]}"; do
            fails=$(grep -oE 'failures="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            errs=$(grep -oE 'errors="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            if [ "${fails:-0}" -gt 0 ] || [ "${errs:-0}" -gt 0 ]; then
              echo "::error file=${f}::${fails} failure(s), ${errs} error(s) in ${f}"
              failed=$((failed + fails + errs))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::${failed} unit-test failure(s)/error(s) detected. See annotations and the test-results artifact."
            exit 1
          fi
          echo "All ${#xmls[@]} JUnit XML reports clean."
      - name: Post failure details to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### CI Unit Test Failure\n\n';
            try {
              const raw = fs.readFileSync('unit-test-output.log', 'utf8');
              const lines = raw.split('\n');
              const errorLines = lines.filter(l =>
                /\be:\b|FAILED|Compilation error|Unresolved reference|not abstract|does not implement/.test(l)
              );
              const tail = lines.slice(-30).join('\n');
              const errors = errorLines.length > 0
                ? errorLines.join('\n')
                : 'No specific error lines matched. Last 30 lines shown.';
              body += '**Error lines:**\n```\n' + errors.slice(0, 2000) + '\n```\n';
              body += '\n**Build tail:**\n```\n' + tail.slice(0, 2000) + '\n```';
            } catch (e) {
              body += 'Could not read unit-test-output.log: ' + e.message;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 7
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/
          retention-days: 7

  # Distribute a debug APK to Firebase App Distribution on every passing
  # CI run. For PRs we overlay a unique versionCode and versionName suffix
  # so Firebase sees each PR push as a distinct release; the overlay is NOT
  # committed back to the PR branch. Main-push distribution is still handled
  # by auto-merge.yml's version-bump-and-distribute (which also commits the
  # authoritative versionCode bump), so we scope this job to pull_request
  # events only to avoid uploading the same commit twice.
  firebase-distribute:
    needs: [lint-and-test]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PR head SHA so autofix commits from the same run aren't
          # accidentally pulled in by a moving `head_ref`.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-android

      - name: Overlay PR versionCode + versionName suffix
        id: version
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          BUILD_FILE="app/build.gradle.kts"
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$BUILD_FILE" | head -1)
          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$BUILD_FILE" | head -1)
          SHORT_SHA="${HEAD_SHA:0:7}"
          # versionCode must be unique per Firebase release; add PR number so
          # concurrent PRs don't collide on the same code. Name carries the
          # PR + SHA so testers can tell which PR a build came from.
          NEW_CODE=$(( CURRENT_CODE + PR_NUMBER * 1000 ))
          NEW_NAME="${CURRENT_NAME}-pr${PR_NUMBER}.${SHORT_SHA}"
          sed -i -E "s/(versionCode\s*=\s*)[0-9]+/\1${NEW_CODE}/" "$BUILD_FILE"
          sed -i -E "s/(versionName\s*=\s*\")[^\"]+(\")/\1${NEW_NAME}\2/" "$BUILD_FILE"
          echo "Overlaid: v${NEW_NAME} (build ${NEW_CODE})"
          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"

      - name: Setup Firebase credentials
        id: firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > "$RUNNER_TEMP/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No Firebase credentials found. Set FIREBASE_SERVICE_ACCOUNT (preferred) or FIREBASE_TOKEN to enable distribution."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.firebase.outputs.has_credentials == 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo "v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }})"
            echo "PR #${{ github.event.pull_request.number }}: ${PR_TITLE}"
            echo "${PR_URL}"
            echo ""
            git log -5 --pretty=format:"• %s"
          } > "$RUNNER_TEMP/release_notes.txt"

      - name: Assemble debug APK
        if: steps.firebase.outputs.has_credentials == 'true'
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: Upload to Firebase App Distribution
        if: steps.firebase.outputs.has_credentials == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release_notes.txt
        run: ./gradlew appDistributionUploadDebug --no-configuration-cache

      - name: Upload debug APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-pr${{ github.event.pull_request.number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: ignore

  capture-failure-log:
    needs: [autofix, lint-and-test, firebase-distribute]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: capture
        uses: ./.github/actions/capture-failure-log
        with:
          workflow-slug: android-ci
      - uses: ./.github/actions/commit-ci-log
        with:
          workflow-slug: android-ci
          log-path: ${{ steps.capture.outputs.log-path }}
