name: Android CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android-ci.yml'
      - '.github/actions/setup-android/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android-ci.yml'
      - '.github/actions/setup-android/**'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # autofix needs to commit
  pull-requests: read
  checks: read

jobs:
  # autofix and lint-and-test run in parallel (no needs: between them).
  # The autofix commit uses [skip ci] to avoid re-triggering this workflow,
  # which mitigates the race condition with the lint-and-test job.
  autofix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-android
      - name: ktlint auto-format
        run: ./gradlew ktlintFormat --continue
        continue-on-error: true
      - name: detekt auto-correct
        run: ./gradlew detekt --auto-correct --continue
        continue-on-error: true
      # Commits with [skip ci] to avoid re-triggering this workflow
      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "style: auto-format [skip ci]" && git push)

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
      - name: ktlint check
        run: ./gradlew ktlintCheck --continue
        continue-on-error: true
      - name: detekt
        run: ./gradlew detekt --continue
        continue-on-error: true
      - name: Android lint
        run: ./gradlew lint --continue
        continue-on-error: true
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --continue
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 7
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/
          retention-days: 7
