name: Build and Release APK

on:
  push:
    branches:
      - main
    paths:
      - 'app/build.gradle.kts'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version_name: ${{ steps.check.outputs.version_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if versionName increased
        id: check
        run: |
          extract_version() {
            grep 'versionName' "$1" | head -1 | grep -oP '"\K[^"]+' || echo ""
          }
          NEW_VERSION=$(extract_version app/build.gradle.kts)
          echo "New versionName: $NEW_VERSION"
          if [ -z "$NEW_VERSION" ]; then
            echo "::warning::Could not extract versionName from app/build.gradle.kts"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git show HEAD^:app/build.gradle.kts > /tmp/prev-build.gradle.kts 2>/dev/null || {
            echo "No previous commit found; treating as release."
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version_name=$NEW_VERSION" >> $GITHUB_OUTPUT
            exit 0
          }
          OLD_VERSION=$(extract_version /tmp/prev-build.gradle.kts)
          echo "Previous versionName: $OLD_VERSION"
          if [ "$NEW_VERSION" = "$OLD_VERSION" ]; then
            echo "versionName unchanged; skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Compare semver: ensure NEW is strictly greater than OLD
          HIGHEST=$(printf '%s\n%s\n' "$OLD_VERSION" "$NEW_VERSION" | sort -V | tail -1)
          if [ "$HIGHEST" = "$NEW_VERSION" ] && [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "versionName increased from $OLD_VERSION to $NEW_VERSION; triggering release."
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version_name=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "versionName did not increase ($OLD_VERSION -> $NEW_VERSION); skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: copilot
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::KEYSTORE_BASE64 secret is not set. Skipping signed release build. To enable signing, encode your keystore with: base64 -w 0 your-keystore.jks"
            echo "has_keystore=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > app/release.keystore
          # Validate the keystore is readable
          keytool -list -keystore app/release.keystore -storepass "$KEYSTORE_PASSWORD" > /dev/null 2>&1 || {
            echo "::error::Keystore is invalid or corrupted. Please re-encode with: base64 -w 0 your-keystore.jks"
            exit 1
          }
          # Validate the key alias exists in the keystore
          KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::KEY_ALIAS secret is not set. Please set it to the alias of your signing key."
            exit 1
          fi
          keytool -list -keystore app/release.keystore -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null 2>&1 || {
            echo "::error::Key alias '$KEY_ALIAS' not found in keystore. Available aliases:"
            keytool -list -keystore app/release.keystore -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | grep -i "alias"
            exit 1
          }
          echo "has_keystore=true" >> $GITHUB_OUTPUT

      - name: Auto-increment versionCode
        run: |
          # Offset by current versionCode so it doesn't go backwards
          OFFSET=6
          NEW_CODE=$(( OFFSET + ${{ github.run_number }} ))
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_CODE/" app/build.gradle.kts
          echo "version_code=$NEW_CODE" >> $GITHUB_ENV

      - name: Build release APK
        if: steps.keystore.outputs.has_keystore == 'true'
        run: ./gradlew assembleRelease --no-configuration-cache --build-cache --parallel
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release AAB
        if: steps.keystore.outputs.has_keystore == 'true'
        run: ./gradlew bundleRelease --no-configuration-cache --build-cache --parallel
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Extract version name
        if: steps.keystore.outputs.has_keystore == 'true'
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=${{ env.version_code }}" >> $GITHUB_OUTPUT

      - name: Get recent commit messages for release notes
        if: steps.keystore.outputs.has_keystore == 'true'
        id: notes
        run: |
          NOTES=$(git log -5 --pretty=format:"• %s" | head -c 500)
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload APK to backend
        if: steps.keystore.outputs.has_keystore == 'true'
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          DEPLOY_API_KEY: ${{ secrets.DEPLOY_API_KEY }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "::warning::API_BASE_URL secret is not set. Skipping APK upload to backend."
            exit 0
          fi
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found in app/build/outputs/apk/release/"
            ls -la app/build/outputs/apk/release/ || true
            exit 1
          fi
          echo "Uploading APK: $APK_PATH"
          curl -f -X POST "${API_BASE_URL}/api/v1/app/releases" \
            -H "Authorization: Bearer ${DEPLOY_API_KEY}" \
            -F "version_code=${{ steps.version.outputs.version_code }}" \
            -F "version_name=${{ steps.version.outputs.version_name }}" \
            -F "release_notes=${{ steps.notes.outputs.release_notes }}" \
            -F "apk=@${APK_PATH}"

      - name: Upload APK as artifact
        if: steps.keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB as artifact
        if: steps.keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Commit AAB to repo root
        if: steps.keystore.outputs.has_keystore == 'true'
        run: |
          AAB_PATH=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          if [ -z "$AAB_PATH" ]; then
            echo "ERROR: No AAB found"
            exit 1
          fi
          cp "$AAB_PATH" app-release.aab
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-release.aab
          git commit -m "Update release AAB (v${{ steps.version.outputs.version_name }}, build ${{ steps.version.outputs.version_code }})"
          git push
