name: Build APK

on:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --build-cache --parallel -x lint -x lintVitalRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Commit APK to repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/debug/*.apk apk/averytask-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/averytask-debug.apk
          git diff --cached --quiet || git commit -m "Build: update debug APK [skip ci]"
          git push
