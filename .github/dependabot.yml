version: 2

# Lowest-cost half of CI_AUDIT_2026-04-30 F5: third-party actions, Gradle
# dependencies, pip packages, and npm packages all flow through here.
# Dependabot's first sweep over `github-actions` will rewrite tag-pinned
# uses (e.g. `actions/checkout@v4`) to commit SHAs and then keep them
# up to date — no manual SHA-pinning sweep needed.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: ci

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, android]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, web]
    commit-message:
      prefix: chore(deps)
